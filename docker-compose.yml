services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────

  postgres:
    image: postgres:15.6
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-libraryai}
      POSTGRES_USER: ${POSTGRES_USER:-libraryai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - libraryai-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-libraryai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (AOF enabled) ──────────────────────────────────────────────────────

  redis:
    image: redis:7.2.4
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - libraryai-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible object storage) ─────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-02-24T17-11-14Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - libraryai-net
    restart: unless-stopped

  # One-shot service that creates the libraryai bucket on first start
  minio-init:
    image: minio/mc:RELEASE.2024-02-24T01-33-20Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        until mc alias set local http://minio:9000 ${S3_ACCESS_KEY_ID:-minioadmin} ${S3_SECRET_ACCESS_KEY:-minioadmin}; do
          sleep 2;
        done;
        until mc ready local; do
          sleep 2;
        done;
        mc mb --ignore-existing local/${S3_BUCKET_NAME:-libraryai};
        exit 0;
      "
    networks:
      - libraryai-net

  # ── MLflow ───────────────────────────────────────────────────────────────────

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.1
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --default-artifact-root /mlartifacts
    volumes:
      - mlflow_data:/mlartifacts
    ports:
      - "5000:5000"
    networks:
      - libraryai-net
    restart: unless-stopped

  # ── Prometheus ───────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - libraryai-net
    restart: unless-stopped

  # ── Alertmanager ─────────────────────────────────────────────────────────────

  alertmanager:
    image: prom/alertmanager:v0.27.0
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    networks:
      - libraryai-net
    restart: unless-stopped

  # ── Grafana ──────────────────────────────────────────────────────────────────

  grafana:
    image: grafana/grafana:10.4.1
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    networks:
      - libraryai-net
    restart: unless-stopped
    depends_on:
      - prometheus

  # ── Frontend (Next.js) ───────────────────────────────────────────────────────
  # Dev mode: source is volume-mounted; hot-reload is provided by `next dev`.
  # The `dev` build target installs node_modules from the deps stage so the
  # container starts without a local node_modules folder on the host.
  #
  # To switch to a production build locally:
  #   docker compose build --build-arg NEXT_PUBLIC_API_BASE_URL=http://localhost:8000 frontend
  #   (then change `target: dev` to `target: runner` below and remove the volume mount)

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./frontend:/app
      - /app/node_modules          # keep container node_modules, don't overwrite with host
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8888}
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    networks:
      - libraryai-net
    restart: unless-stopped
    depends_on:
      - eep

  # ── EEP API ──────────────────────────────────────────────────────────────────

  eep:
    build:
      context: .
      dockerfile: services/eep/Dockerfile
    volumes:
      - .:/app
    environment:
      PYTHONPATH: /app
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    env_file: .env
    ports:
      - "8888:8000"
    networks:
      - libraryai-net
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    command: >
      sh -c "
        cd /app/services/eep && alembic upgrade head && cd /app &&
        if [ -n \"$$BOOTSTRAP_ADMIN_PASSWORD\" ]; then
          python -m scripts.create_admin
            --username \"$$BOOTSTRAP_ADMIN_USERNAME\"
            --password \"$$BOOTSTRAP_ADMIN_PASSWORD\"
            --skip-if-exists;
        fi &&
        uvicorn services.eep.app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  # ── EEP worker ───────────────────────────────────────────────────────────────
  #
  # Google Document AI credentials (local dev only):
  #   If you want to test Google Document AI locally, bind-mount your service
  #   account key file into the container and enable the integration in .env:
  #
  #     volumes:
  #       - /path/to/your/sa-key.json:/var/secrets/google/key.json:ro
  #
  #   Then set in .env:
  #     GOOGLE_ENABLED=true
  #     GOOGLE_PROJECT_ID=your-gcp-project
  #     GOOGLE_PROCESSOR_ID_LAYOUT=your-layout-processor-id
  #
  # Kubernetes (ops must apply externally — no full K8s manifests in this repo):
  #   Mount Secret 'google-documentai-sa' at /var/secrets/google (readOnly: true).
  #   Example snippet for the eep-worker Deployment:
  #     volumes:
  #       - name: google-documentai-sa
  #         secret:
  #           secretName: google-documentai-sa
  #     volumeMounts:
  #       - name: google-documentai-sa
  #         mountPath: /var/secrets/google
  #         readOnly: true
  #   Non-secret settings (GOOGLE_PROJECT_ID, GOOGLE_LOCATION, etc.) go in a
  #   ConfigMap and are referenced as env vars in the Deployment spec.

  eep-worker:
    build:
      context: .
      dockerfile: services/eep_worker/Dockerfile
    volumes:
      - .:/app
      # Mount the local Google service-account JSON into the container.
      - type: bind
        source: ${GOOGLE_CREDENTIALS_HOST_PATH:-./google-credentials-stub.json}
        target: /var/secrets/google/key.json
        read_only: true
    environment:
      PYTHONPATH: /app
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      HEALTH_PORT: "9100"
      EXECUTION_TIMEOUT_SECONDS: "180"
      COLD_START_TIMEOUT_SECONDS: "240"
    env_file: .env
    expose:
      - "9100"
    networks:
      - libraryai-net
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_started
    command:
      [
        "uvicorn",
        "services.eep_worker.app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "9100",
        "--reload",
        "--reload-dir",
        "/app/services/eep_worker",
        "--reload-dir",
        "/app/services/eep/app",
        "--reload-dir",
        "/app/shared",
      ]

  # ── EEP recovery ─────────────────────────────────────────────────────────────

  eep-recovery:
    build:
      context: .
      dockerfile: services/eep_recovery/Dockerfile
    volumes:
      - .:/app
    environment:
      PYTHONPATH: /app
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      HEALTH_PORT: "9101"
    env_file: .env
    expose:
      - "9101"
    networks:
      - libraryai-net
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
    command: ["uvicorn", "services.eep_recovery.app.main:app", "--host", "0.0.0.0", "--port", "9101", "--reload"]

  # ── Shadow worker ─────────────────────────────────────────────────────────────

  shadow-worker:
    build:
      context: .
      dockerfile: services/shadow_worker/Dockerfile
    volumes:
      - .:/app
    environment:
      PYTHONPATH: /app
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      HEALTH_PORT: "9102"
    env_file: .env
    expose:
      - "9102"
    networks:
      - libraryai-net
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
    command: ["uvicorn", "services.shadow_worker.app.main:app", "--host", "0.0.0.0", "--port", "9102", "--reload"]

  # ── Shadow recovery ───────────────────────────────────────────────────────────

  shadow-recovery:
    build:
      context: .
      dockerfile: services/shadow_recovery/Dockerfile
    volumes:
      - .:/app
    environment:
      PYTHONPATH: /app
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      HEALTH_PORT: "9103"
    env_file: .env
    expose:
      - "9103"
    networks:
      - libraryai-net
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
    command: ["uvicorn", "services.shadow_recovery.app.main:app", "--host", "0.0.0.0", "--port", "9103", "--reload"]

  # ── Retraining worker ─────────────────────────────────────────────────────────

  retraining-worker:
    build:
      context: .
      dockerfile: services/retraining_worker/Dockerfile
    volumes:
      - .:/app
    environment:
      PYTHONPATH: /app
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      HEALTH_PORT: "9104"
    env_file: .env
    expose:
      - "9104"
    networks:
      - libraryai-net
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      mlflow:
        condition: service_started
    command: ["uvicorn", "services.retraining_worker.app.main:app", "--host", "0.0.0.0", "--port", "9104", "--reload"]

  # ── Dataset builder (manual/scheduled job) ────────────────────────────────────
  #
  # Produces/refreshes corrected-export retraining dataset entries consumed by
  # retraining-worker in corrected_only/corrected_hybrid modes.
  #
  # Example run:
  #   docker compose --profile dataset-build run --rm dataset-builder --mode corrected-export --approved
  #
  dataset-builder:
    profiles: ["dataset-build"]
    build:
      context: .
      dockerfile: services/dataset_builder/Dockerfile
    volumes:
      - .:/app
    environment:
      PYTHONPATH: /app
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    env_file: .env
    networks:
      - libraryai-net
    restart: "no"
    command: ["python", "services/dataset_builder/app/main.py", "--mode", "scheduled", "--approved"]

  # ── Retraining recovery ────────────────────────────────────────────────────────

  retraining-recovery:
    build:
      context: .
      dockerfile: services/retraining_recovery/Dockerfile
    volumes:
      - .:/app
    environment:
      PYTHONPATH: /app
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      HEALTH_PORT: "9105"
    env_file: .env
    expose:
      - "9105"
    networks:
      - libraryai-net
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
    command: ["uvicorn", "services.retraining_recovery.app.main:app", "--host", "0.0.0.0", "--port", "9105", "--reload"]

  # ── Artifact cleanup ──────────────────────────────────────────────────────────

  artifact-cleanup:
    build:
      context: .
      dockerfile: services/artifact_cleanup/Dockerfile
    volumes:
      - .:/app
    environment:
      PYTHONPATH: /app
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      HEALTH_PORT: "9106"
    env_file: .env
    expose:
      - "9106"
    networks:
      - libraryai-net
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_started
      minio:
        condition: service_started
    command: ["uvicorn", "services.artifact_cleanup.app.main:app", "--host", "0.0.0.0", "--port", "9106", "--reload"]

  # ── IEP0 — Material-type classification service ──────────────────────────────

  iep0:
    build:
      context: .
      dockerfile: services/iep0/Dockerfile
    volumes:
      - .:/app
      - ./models/iep0:/app/models/iep0:ro
    environment:
      PYTHONPATH: /app
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    env_file: .env
    ports:
      - "8006:8006"
    networks:
      - libraryai-net
    restart: unless-stopped
    command: ["uvicorn", "services.iep0.app.main:app", "--host", "0.0.0.0", "--port", "8006", "--reload"]

  # ── IEP1A — YOLOv8-seg geometry service ──────────────────────────────────────

  iep1a:
    build:
      context: .
      dockerfile: services/iep1a/Dockerfile
    volumes:
      - .:/app
      - ./test_data:/app/test_data
      - ./models/iep1a:/app/models/iep1a:ro
    environment:
      PYTHONPATH: /app
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      IEP1A_MODELS_DIR: /app/models/iep1a
      IEP1A_MOCK_MODE: "false"
    env_file: .env
    ports:
      - "8001:8001"
    networks:
      - libraryai-net
    restart: unless-stopped
    command: ["uvicorn", "services.iep1a.app.main:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]

  # ── IEP1B — YOLOv8-pose geometry service ─────────────────────────────────────

  iep1b:
    build:
      context: .
      dockerfile: services/iep1b/Dockerfile
    volumes:
      - .:/app
      - ./models/iep1b:/app/models/iep1b:ro
    environment:
      PYTHONPATH: /app
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      IEP1B_MODELS_DIR: /app/models/iep1b
      IEP1B_MOCK_MODE: "false"
    env_file: .env
    ports:
      - "8002:8002"
    networks:
      - libraryai-net
    restart: unless-stopped
    command: ["uvicorn", "services.iep1b.app.main:app", "--host", "0.0.0.0", "--port", "8002", "--reload"]

  # ── IEP1D — UVDoc rectification service ──────────────────────────────────────

  iep1d:
    build:
      context: .
      dockerfile: services/iep1d/Dockerfile
    volumes:
      - .:/app
      # Development-only override for a mounted UVDoc checkpoint.
      - "${IEP1D_LOCAL_WEIGHTS_DIR:-./models/iep1d}:/dev-models/iep1d:ro"
    environment:
      PYTHONPATH: /app
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      IEP1D_LOCAL_WEIGHTS_PATH: /dev-models/iep1d/best_model.pkl
    env_file: .env
    ports:
      - "8003:8003"
    networks:
      - libraryai-net
    restart: unless-stopped
    command: ["uvicorn", "services.iep1d.app.main:app", "--host", "0.0.0.0", "--port", "8003", "--reload"]

  # ── IEP1E — Semantic normalization service ───────────────────────────────────
  #
  # Real-model build (optional):
  #   Set IEP1E_ENABLE_REAL_MODEL=true in your shell or .env, then:
  #     docker compose build iep1e
  #   Enable inference at runtime by also setting IEP1E_MOCK_MODE=false in .env.
  #   Without real-model, service runs in mock mode (returns no rotation, unresolved).

  iep1e:
    build:
      context: .
      dockerfile: services/iep1e/Dockerfile
      args:
        ENABLE_REAL_MODEL: "${IEP1E_ENABLE_REAL_MODEL:-false}"
    volumes:
      - .:/app
    environment:
      PYTHONPATH: /app
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      # Default to mock mode; set IEP1E_MOCK_MODE=false to use real PaddleOCR.
      IEP1E_MOCK_MODE: "${IEP1E_MOCK_MODE:-true}"
      IEP1E_USE_GPU: "${IEP1E_USE_GPU:-false}"
      IEP1E_MODEL_DIR: "${IEP1E_MODEL_DIR:-/opt/models/iep1e}"
    env_file: .env
    ports:
      - "8007:8007"
    networks:
      - libraryai-net
    restart: unless-stopped
    command: [
      "uvicorn", "services.iep1e.app.main:app",
      "--host", "0.0.0.0", "--port", "8007"
    ]

  # ── IEP2A — Detectron2 layout detection ──────────────────────────────────────
  #
  # Real-model build (optional):
  #   Set IEP2A_ENABLE_REAL_MODEL=true in your shell or .env, then:
  #     docker compose build iep2a
  #   Enable inference at runtime by also setting IEP2A_USE_REAL_MODEL=true
  #   in .env.  See services/iep2a/Dockerfile for full instructions.

  iep2a:
    build:
      context: .
      dockerfile: services/iep2a/Dockerfile
      args:
        # Pass IEP2A_ENABLE_REAL_MODEL=true to install ML deps at build time.
        # Defaults to false → base/stub image.
        ENABLE_REAL_MODEL: "${IEP2A_ENABLE_REAL_MODEL:-false}"
        # Pass IEP2A_ENABLE_PADDLE_BACKEND=true to install PaddleOCR PP-DocLayoutV2
        # support alongside the default Detectron2 backend.
        ENABLE_PADDLE_BACKEND: "${IEP2A_ENABLE_PADDLE_BACKEND:-false}"
    volumes:
      - .:/app
      # Development-only override for a mounted PubLayNet checkpoint.
      # Mounted under /dev-models so it cannot shadow the baked /opt/models path.
      - "${IEP2A_LOCAL_WEIGHTS_DIR:-./models/iep2a}:/dev-models/iep2a:ro"
    environment:
      PYTHONPATH: /app
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      # IEP2A_USE_REAL_MODEL is intentionally NOT set here.
      # Add IEP2A_USE_REAL_MODEL=true to .env to enable real inference.
    env_file: .env
    ports:
      - "8004:8004"
    networks:
      - libraryai-net
    restart: unless-stopped
    command:
      [
        "uvicorn",
        "services.iep2a.app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8004",
        "--reload",
        "--reload-dir",
        "/app/services/iep2a",
        "--reload-dir",
        "/app/shared",
      ]

  # ── IEP2B — DocLayout-YOLO layout detection ───────────────────────────────────
  #
  # Real-model build (optional):
  #   Set IEP2B_ENABLE_REAL_MODEL=true in your shell or .env, then:
  #     docker compose build iep2b
  #   Enable inference at runtime by also setting IEP2B_USE_REAL_MODEL=true
  #   in .env.  See services/iep2b/Dockerfile for full instructions.

  iep2b:
    build:
      context: .
      dockerfile: services/iep2b/Dockerfile
      args:
        # Pass IEP2B_ENABLE_REAL_MODEL=true to install ML deps at build time.
        # Defaults to false → base/stub image.
        ENABLE_REAL_MODEL: "${IEP2B_ENABLE_REAL_MODEL:-false}"
    volumes:
      - .:/app
      # Development-only override for a mounted DocLayout-YOLO checkpoint.
      # Mounted under /dev-models so it cannot shadow the baked /opt/models path.
      - "${IEP2B_LOCAL_WEIGHTS_DIR:-./models/iep2b}:/dev-models/iep2b:ro"
    environment:
      PYTHONPATH: /app
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      # IEP2B_USE_REAL_MODEL is intentionally NOT set here.
      # Add IEP2B_USE_REAL_MODEL=true to .env to enable real inference.
    env_file: .env
    ports:
      - "8005:8005"
    networks:
      - libraryai-net
    restart: unless-stopped
    command:
      [
        "uvicorn",
        "services.iep2b.app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8005",
        "--reload",
        "--reload-dir",
        "/app/services/iep2b",
        "--reload-dir",
        "/app/shared",
      ]

# ── Volumes ───────────────────────────────────────────────────────────────────

volumes:
  postgres_data:
  redis_data:
  minio_data:
  mlflow_data:
  prometheus_data:
  alertmanager_data:
  grafana_data:

# ── Networks ──────────────────────────────────────────────────────────────────

networks:
  libraryai-net:
    driver: bridge
