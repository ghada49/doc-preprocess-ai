# services/eep/alembic.ini
# Alembic configuration for the EEP service database.
# The database URL is read from the DATABASE_URL environment variable at
# runtime so that local, CI, and production environments can differ without
# changing this file.

[alembic]
# Path to migration scripts, relative to this file.
script_location = migrations

# Do NOT hard-code credentials here. URL is set in env.py from DATABASE_URL.
# sqlalchemy.url is left unset; env.py populates it at runtime.

# Logging configuration.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
