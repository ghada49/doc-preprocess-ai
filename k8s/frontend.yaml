apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: libraryai
  labels:
    app: frontend
    app.kubernetes.io/part-of: libraryai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      # Build the production image with:
      #   docker build \
      #     --target runner \
      #     --build-arg NEXT_PUBLIC_API_BASE_URL=https://api.libraryai.example.com \
      #     -t your-registry/libraryai-frontend:latest \
      #     ./frontend
      containers:
        - name: frontend
          image: your-registry/libraryai-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
            # NEXT_PUBLIC_* vars are baked in at build time (Next.js behaviour).
            # If you need to change the API URL without rebuilding, switch to
            # runtime config or an env-substitution init-container pattern.
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: libraryai
  labels:
    app: frontend
    app.kubernetes.io/part-of: libraryai
spec:
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 3000
  type: ClusterIP
