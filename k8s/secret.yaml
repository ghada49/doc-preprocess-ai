# Secret template — replace every CHANGE_ME value before applying.
# Values must be base64-encoded:  echo -n 'my-value' | base64
#
# DO NOT commit real secrets to git.  Use a secrets manager (Vault, AWS
# Secrets Manager, Azure Key Vault) or sealed-secrets in production.
#
# Apply:  kubectl apply -f k8s/secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: libraryai-secret
  namespace: libraryai
  labels:
    app.kubernetes.io/part-of: libraryai
type: Opaque
data:
  # Full DSN read by the code (services/eep/app/db/session.py).
  # echo -n 'postgresql://libraryai:PASSWORD@your-rds-host:5432/libraryai' | base64
  DATABASE_URL: "Q0hBTkdFX01F"            # placeholder: CHANGE_ME

  # Full URL read by the code (services/eep/app/queue.py).
  # echo -n 'redis://your-elasticache-host:6379/0' | base64
  REDIS_URL: "Q0hBTkdFX01F"               # placeholder: CHANGE_ME

  # PostgreSQL password  (echo -n 'your-password' | base64)
  POSTGRES_PASSWORD: "Q0hBTkdFX01F"       # placeholder: CHANGE_ME

  # S3 / MinIO credentials
  S3_ACCESS_KEY_ID:     "Q0hBTkdFX01F"    # placeholder: CHANGE_ME
  S3_SECRET_ACCESS_KEY: "Q0hBTkdFX01F"    # placeholder: CHANGE_ME

  # JWT signing secret (use a long random string)
  JWT_SECRET_KEY: "Q0hBTkdFX01F"          # placeholder: CHANGE_ME

  # Grafana admin password
  GF_ADMIN_PASSWORD: "Q0hBTkdFX01F"       # placeholder: CHANGE_ME

  # Admin bootstrap credentials (used by admin-bootstrap-job.yaml)
  # echo -n 'admin'         | base64  → YWRtaW4=
  # echo -n 'your-password' | base64  → ...
  BOOTSTRAP_ADMIN_USERNAME: "YWRtaW4="     # placeholder: admin
  BOOTSTRAP_ADMIN_PASSWORD: "Q0hBTkdFX01F" # placeholder: CHANGE_ME

---
# Google Document AI service-account key.
# Mount this Secret at /var/secrets/google in the eep-worker Deployment
# (see eep-worker.yaml volumeMounts).
# Create via:
#   kubectl create secret generic google-documentai-sa \
#     --from-file=key.json=/path/to/your/sa-key.json \
#     -n libraryai
#
# Shown here as a template only — do not put the real key in this file.
apiVersion: v1
kind: Secret
metadata:
  name: google-documentai-sa
  namespace: libraryai
  labels:
    app.kubernetes.io/part-of: libraryai
type: Opaque
data:
  key.json: ""    # replace with: base64 -w0 /path/to/sa-key.json
