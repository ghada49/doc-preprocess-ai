# Inference service Deployments and ClusterIP Services.
#
# IMPORTANT — external dependencies:
#   PostgreSQL: managed externally (RDS or equivalent).  Set DATABASE_URL in secret.yaml.
#   Redis:      managed externally (ElastiCache or equivalent).  Set REDIS_URL in secret.yaml.
#   S3:         AWS S3 (no MinIO manifest included).  S3_ENDPOINT_URL is absent in configmap.yaml
#               so boto3 uses the standard AWS regional endpoint.  S3 credentials come from
#               libraryai-secret via secretRef on each inference Deployment below.
#   Neither Postgres nor Redis has a manifest in this k8s/ directory by design.
#
# GPU note (IEP1A, IEP1B):
#   These services request nvidia.com/gpu: "1".  You must have the nvidia-device-plugin
#   DaemonSet installed.  The nodeSelector below uses the standard
#   accelerator=nvidia-gpu label; relabel your GPU node-pool to match, or replace
#   the nodeSelector with whatever label your cluster assigns to GPU nodes.
#   IEP0, IEP1D, IEP1E, IEP2A, IEP2B are CPU-capable and carry no GPU selector.

---
# ── IEP0 — material-type classifier (CPU) ─────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iep0
  namespace: libraryai
  labels:
    app: iep0
    app.kubernetes.io/part-of: libraryai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iep0
  template:
    metadata:
      labels:
        app: iep0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8006"
    spec:
      containers:
        - name: iep0
          image: your-registry/libraryai-iep0:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8006
          envFrom:
            - configMapRef:
                name: libraryai-config
            - secretRef:
                name: libraryai-secret
          env:
            - name: PYTHONPATH
              value: /app
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8006
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8006
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
---
apiVersion: v1
kind: Service
metadata:
  name: iep0
  namespace: libraryai
  labels:
    app: iep0
    app.kubernetes.io/part-of: libraryai
spec:
  selector:
    app: iep0
  ports:
    - name: http
      port: 8006
      targetPort: 8006
  type: ClusterIP

---
# ── IEP1A — YOLOv8-seg geometry (GPU required) ────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iep1a
  namespace: libraryai
  labels:
    app: iep1a
    app.kubernetes.io/part-of: libraryai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iep1a
  template:
    metadata:
      labels:
        app: iep1a
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8001"
    spec:
      # Replace accelerator=nvidia-gpu with the label your cluster assigns to GPU nodes.
      nodeSelector:
        accelerator: nvidia-gpu
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: iep1a
          image: your-registry/libraryai-iep1a:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: libraryai-config
            - secretRef:
                name: libraryai-secret
          env:
            - name: PYTHONPATH
              value: /app
            - name: IEP1A_MOCK_MODE
              value: "false"
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "2000m"
              memory: "4Gi"
              nvidia.com/gpu: "1"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
---
apiVersion: v1
kind: Service
metadata:
  name: iep1a
  namespace: libraryai
  labels:
    app: iep1a
    app.kubernetes.io/part-of: libraryai
spec:
  selector:
    app: iep1a
  ports:
    - name: http
      port: 8001
      targetPort: 8001
  type: ClusterIP

