# Background worker and recovery Deployments.
# Includes: retraining-worker, retraining-recovery, shadow-worker,
#           shadow-recovery, artifact-cleanup.
#
# None of these services expose a public endpoint — ClusterIP is omitted
# intentionally (health scrape goes pod-direct via Prometheus annotations).

---
# ── retraining-worker ─────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: retraining-worker
  namespace: libraryai
  labels:
    app: retraining-worker
    app.kubernetes.io/part-of: libraryai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: retraining-worker
  template:
    metadata:
      labels:
        app: retraining-worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "9104"
    spec:
      containers:
        - name: retraining-worker
          image: your-registry/libraryai-retraining-worker:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 9104
              name: health
          envFrom:
            - configMapRef:
                name: libraryai-config
            - secretRef:
                name: libraryai-secret
          env:
            - name: PYTHONPATH
              value: /app
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 9104
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000

