global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Packet 9.6 — alert rule files loaded from the rules directory.
# In Docker/Kubernetes the alert_rules/ directory is mounted at
# /etc/prometheus/rules/ (see docker-compose / Helm values).
rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  # ── Prometheus self-scrape ────────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # ── EEP API ───────────────────────────────────────────────────────────────
  - job_name: eep
    static_configs:
      - targets: ["eep:8000"]

  # ── Background workers and recovery services ─────────────────────────────
  # Workers use FQDN because their ECS Service Connect configs have no
  # clientAliases (deploy.yml falls through to the default `*` case).
  # Short-name resolution is only available for services with explicit aliases.
  - job_name: eep-worker
    static_configs:
      - targets: ["eep-worker.libraryai.local:9100"]

  - job_name: eep-recovery
    static_configs:
      - targets: ["eep-recovery.libraryai.local:9101"]

  - job_name: shadow-worker
    static_configs:
      - targets: ["shadow-worker.libraryai.local:9102"]

  - job_name: retraining-worker
    static_configs:
      - targets: ["retraining-worker.libraryai.local:9104"]


  # ── IEP services ──────────────────────────────────────────────────────────
  - job_name: iep0
    static_configs:
      - targets: ["iep0:8006"]

  - job_name: iep1a
    static_configs:
      - targets: ["iep1a:8001"]

  - job_name: iep1b
    static_configs:
      - targets: ["iep1b:8002"]

  - job_name: iep1d
    static_configs:
      - targets: ["iep1d:8003"]

  - job_name: iep1e
    static_configs:
      - targets: ["iep1e:8007"]

  - job_name: iep2a
    static_configs:
      - targets: ["iep2a:8004"]

  - job_name: iep2b
    static_configs:
      - targets: ["iep2b:8005"]
