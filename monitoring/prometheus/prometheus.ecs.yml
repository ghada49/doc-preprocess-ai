# monitoring/prometheus/prometheus.ecs.yml
#
# ECS-specific Prometheus configuration for the LibraryAI demo/batch
# observability stack.
#
# Key differences from prometheus.yml (docker-compose):
#   - Targets use the short ECS Service Connect aliases published by deploy.yml.
#   - No Alertmanager block — Alertmanager is not deployed in the ECS stack.
#     Alert rules are still loaded so they are visible in the Prometheus UI,
#     but no automated webhook actions will fire.
#   - The cleanup service is not deployed; no scrape target for it exists here.
#
# This file is baked into the libraryai-prometheus-ecs Docker image by
# monitoring/prometheus/Dockerfile.ecs and becomes /etc/prometheus/prometheus.yml
# inside the container.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alertmanager intentionally omitted — not deployed in ECS stack.
# (alerting block removed; see docker-compose prometheus.yml for the full config)

rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  # ── Prometheus self-scrape ────────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # ── EEP API ───────────────────────────────────────────────────────────────
  - job_name: eep
    static_configs:
      - targets: ["eep:8000"]

  # ── Background workers and recovery services ──────────────────────────────
  - job_name: eep-worker
    static_configs:
      - targets: ["eep-worker:9100"]

  - job_name: eep-recovery
    static_configs:
      - targets: ["eep-recovery:9101"]

  - job_name: shadow-worker
    static_configs:
      - targets: ["shadow-worker:9102"]

  - job_name: retraining-worker
    static_configs:
      - targets: ["retraining-worker:9104"]

  # ── IEP services ──────────────────────────────────────────────────────────
  - job_name: iep0
    static_configs:
      - targets: ["iep0:8006"]

  - job_name: iep1a
    static_configs:
      - targets: ["iep1a:8001"]

  - job_name: iep1b
    static_configs:
      - targets: ["iep1b:8002"]

  - job_name: iep1d
    static_configs:
      - targets: ["iep1d:8003"]

  - job_name: iep1e
    static_configs:
      - targets: ["iep1e:8007"]

  - job_name: iep2a
    static_configs:
      - targets: ["iep2a-v2:8004"]

  - job_name: iep2b
    static_configs:
      - targets: ["iep2b:8005"]
