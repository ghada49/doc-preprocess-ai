name: CI

on:
  push:
    branches: [main, "iep*", "feat/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit tests (Python 3.11)
    runs-on: ubuntu-latest

    env:
      # Auth — minimal values so JWT imports don't fail at module load time
      JWT_SECRET_KEY: ci-test-secret-key
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      # Prevent IEP2A from trying to load real ML models
      IEP2A_USE_REAL_MODEL: "false"
      # Storage — point at localhost so S3 backend doesn't attempt real calls
      S3_ENDPOINT_URL: "http://localhost:9000"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Run unit + integration tests
        run: |
          uv run pytest tests/ \
            --ignore=tests/test_p1_migration.py \
            --ignore=tests/test_google_document_ai.py \
            --ignore=tests/test_p2_2_google_worker_config.py \
            -q --tb=short

  migration-tests:
    name: Migration tests (PostgreSQL)
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: libraryai
          POSTGRES_PASSWORD: libraryai
          POSTGRES_DB: libraryai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://libraryai:libraryai@localhost:5432/libraryai_test"
      JWT_SECRET_KEY: ci-test-secret-key
      JWT_ALGORITHM: HS256

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Run migration tests
        run: |
          uv run pytest tests/test_p1_migration.py \
            -q --tb=short
