name: Process — Scheduled Window

# ──────────────────────────────────────────────────────────────────────────────
# This workflow is used when PROCESSING_START_MODE=scheduled_window.
#
# In scheduled_window mode:
#   - Jobs can arrive anytime and stay queued in the DB/Redis.
#   - This workflow runs on the configured cron and starts processing only if
#     processable work exists (queued/active pages, non-empty Redis queues).
#   - Infrastructure stops as soon as work drains (scale-down.yml handles this).
#
# In immediate mode (current default):
#   - This workflow does nothing useful (step 1 exits early).
#   - The EEP API triggers scale-up directly after job creation.
#   - This workflow can be kept enabled as a safety net with no side-effects.
#
# To switch to scheduled_window mode:
#   1. Set GitHub variable PROCESSING_START_MODE=scheduled_window
#      (or update the env var in eep-task-def.json and redeploy EEP).
#   2. Adjust the cron schedule below for your desired processing window.
#   3. Disable/remove the cron in scale-up.yml to avoid conflicts.
#
# How it works:
#   Step 1  — Check if PROCESSING_START_MODE=scheduled_window; skip if not.
#   Step 2  — Run drain_monitor --check-only as a Fargate task.
#             Exits 0 if processable work exists, exits 1 if already drained.
#   Step 3  — Trigger scale-up workflow (reuse scale-up.yml) if work exists.
# ──────────────────────────────────────────────────────────────────────────────

on:
  # Default: 10 PM UTC daily. Adjust to match your desired processing window.
  # Operator note: disable this cron when using immediate mode to avoid spurious
  # scale-ups. It is safe to leave enabled — step 1 exits early in immediate mode.
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  actions: write  # needed to trigger scale-up.yml via workflow_dispatch API

env:
  AWS_REGION:  ${{ vars.AWS_REGION }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
  DRAIN_SUBNET: ${{ vars.DRAIN_SUBNET_ID }}
  DRAIN_SG:     ${{ vars.DRAIN_SECURITY_GROUP_ID }}

jobs:
  check-and-start:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: ${{ vars.AWS_REGION }}

      # ── Step 1: Check mode ────────────────────────────────────────────────
      - name: Check PROCESSING_START_MODE
        id: check_mode
        run: |
          MODE="${{ vars.PROCESSING_START_MODE || 'immediate' }}"
          echo "PROCESSING_START_MODE=$MODE"
          if [ "$MODE" = "scheduled_window" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "Mode is scheduled_window — continuing."
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "Mode is '$MODE' (not scheduled_window) — nothing to do. Exiting."
          fi

      # ── Step 2: Register drain-monitor task definition ────────────────────
      - name: Register drain-monitor task definition
        id: register_drain
        if: steps.check_mode.outputs.proceed == 'true'
        run: |
          TASK_DEF_FILE=$(mktemp)
          sed \
            -e "s/ACCOUNT_ID/${{ vars.AWS_ACCOUNT_ID }}/g" \
            -e "s/REGION/${{ vars.AWS_REGION }}/g" \
            k8s/ecs/drain-monitor-task-def.json > "$TASK_DEF_FILE"
          python3 -m json.tool "$TASK_DEF_FILE" > /dev/null
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json "file://$TASK_DEF_FILE" \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "task_def_arn=$TASK_DEF_ARN" >> "$GITHUB_OUTPUT"

      # ── Step 3: Run drain_monitor --check-only as Fargate task ───────────
      # Exit 0 = has processable work (scale-up warranted)
      # Exit 1 = already drained (nothing to start)
      - name: Check for processable work (drain_monitor --check-only)
        id: check_work
        if: steps.check_mode.outputs.proceed == 'true'
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --task-definition "${{ steps.register_drain.outputs.task_def_arn }}" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$DRAIN_SUBNET],securityGroups=[$DRAIN_SG],assignPublicIp=DISABLED}" \
            --overrides "{\"containerOverrides\":[{\"name\":\"drain-monitor\",\"command\":[\"python\",\"/app/scripts/ecs_scaler/drain_monitor.py\",\"--assert-has-work\"],\"environment\":[{\"name\":\"ECS_CLUSTER\",\"value\":\"$ECS_CLUSTER\"},{\"name\":\"AWS_REGION\",\"value\":\"$AWS_REGION\"}]}]}" \
            --query 'tasks[0].taskArn' --output text)
          echo "task_arn=$TASK_ARN" >> "$GITHUB_OUTPUT"
          echo "Check task started: $TASK_ARN"

          # Wait for task to stop
          for i in $(seq 1 30); do
            STATUS=$(aws ecs describe-tasks \
              --cluster "$ECS_CLUSTER" \
              --tasks "$TASK_ARN" \
              --query 'tasks[0].lastStatus' --output text)
            echo "  attempt $i/30 — status=$STATUS"
            if [ "$STATUS" = "STOPPED" ]; then break; fi
            sleep 10
          done

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          echo "exit_code=$EXIT_CODE"

          if [ "$EXIT_CODE" = "0" ]; then
            echo "has_work=true" >> "$GITHUB_OUTPUT"
            echo "Processable work found — will trigger scale-up."
          elif [ "$EXIT_CODE" = "1" ]; then
            echo "has_work=false" >> "$GITHUB_OUTPUT"
            echo "No processable work — scale-up skipped."
          else
            echo "ERROR: drain_monitor failed before producing a work decision (exit_code=$EXIT_CODE)."
            exit 1
          fi

      # ── Step 4: Trigger scale-up if work exists ───────────────────────────
      - name: Trigger scale-up (scale-up.yml via workflow_dispatch)
        if: |
          steps.check_mode.outputs.proceed == 'true' &&
          steps.check_work.outputs.has_work == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run scale-up.yml \
            --ref "${{ github.ref_name }}"
          echo "Scale-up workflow triggered for scheduled_window."
