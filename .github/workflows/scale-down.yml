name: Scale Down — Drain and Stop Processing

on:
  # Schedule: 8 AM UTC daily (after overnight batch). To change, edit this file.
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: "Force scale-down even if drain check times out? true/false"
        required: false
        default: "false"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION:            ${{ vars.AWS_REGION }}
  ECS_CLUSTER:           ${{ vars.ECS_CLUSTER }}
  DRAIN_TIMEOUT_MINUTES: ${{ vars.DRAIN_TIMEOUT_MINUTES || '120' }}
  FORCE:                 ${{ inputs.force || 'false' }}
  DRAIN_SUBNET:          ${{ vars.DRAIN_SUBNET_ID }}
  DRAIN_SG:              ${{ vars.DRAIN_SECURITY_GROUP_ID }}

jobs:
  drain-and-scale-down:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: ${{ vars.AWS_REGION }}

      # ── Step 1: Register drain-monitor task definition ───────────────────
      - name: Register drain-monitor task definition
        id: register_drain
        run: |
          TASK_DEF_FILE=$(mktemp)
          sed \
            -e "s/ACCOUNT_ID/${{ vars.AWS_ACCOUNT_ID }}/g" \
            -e "s/REGION/${{ vars.AWS_REGION }}/g" \
            k8s/ecs/drain-monitor-task-def.json > "$TASK_DEF_FILE"
          python3 -m json.tool "$TASK_DEF_FILE" > /dev/null
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json "file://$TASK_DEF_FILE" \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "task_def_arn=$TASK_DEF_ARN" >> "$GITHUB_OUTPUT"

      # ── Step 2: Run drain monitor as Fargate task in VPC ─────────────────
      # Workers are still running so in-flight pages can complete normally.
      - name: Run drain monitor (ECS Fargate task in VPC)
        id: drain_task
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --task-definition "${{ steps.register_drain.outputs.task_def_arn }}" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$DRAIN_SUBNET],securityGroups=[$DRAIN_SG],assignPublicIp=DISABLED}" \
            --overrides "{\"containerOverrides\":[{\"name\":\"drain-monitor\",\"environment\":[{\"name\":\"DRAIN_TIMEOUT_MINUTES\",\"value\":\"$DRAIN_TIMEOUT_MINUTES\"},{\"name\":\"DRAIN_FORCE\",\"value\":\"$FORCE\"}]}]}" \
            --query 'tasks[0].taskArn' --output text)
          echo "task_arn=$TASK_ARN" >> "$GITHUB_OUTPUT"
          echo "Drain monitor task started: $TASK_ARN"

      - name: Wait for drain monitor to complete
        run: |
          set -euo pipefail
          # Must stay in sync with DRAIN_TIMEOUT_MINUTES passed into the container.
          # Previously this loop was fixed at 60 iterations × 60s = 60 minutes while
          # drain_monitor.py defaults to waiting up to 120 minutes — the workflow
          # failed at ~60m with "never reached STOPPED" even though the task was
          # still healthy and draining.  Poll for DRAIN_TIMEOUT + grace margin.
          DRAIN_M="${DRAIN_TIMEOUT_MINUTES:-120}"
          MAX_ITER=$(( DRAIN_M + 20 ))
          echo "Polling drain monitor task until STOPPED (max ~${MAX_ITER} min, interval 60s, DRAIN_TIMEOUT_MINUTES=$DRAIN_M)..."
          for i in $(seq 1 "$MAX_ITER"); do
            STATUS=$(aws ecs describe-tasks \
              --cluster "$ECS_CLUSTER" \
              --tasks "${{ steps.drain_task.outputs.task_arn }}" \
              --query 'tasks[0].lastStatus' --output text)
            echo "  attempt $i/$MAX_ITER — status=$STATUS"
            if [ "$STATUS" = "STOPPED" ]; then
              break
            fi
            sleep 60
          done
          # Verify it actually stopped
          STATUS=$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" \
            --tasks "${{ steps.drain_task.outputs.task_arn }}" \
            --query 'tasks[0].lastStatus' --output text)
          if [ "$STATUS" != "STOPPED" ]; then
            echo "ERROR: Drain monitor task never reached STOPPED state after ~${MAX_ITER} min"
            exit 1
          fi

      - name: Check drain monitor exit code
        run: |
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" \
            --tasks "${{ steps.drain_task.outputs.task_arn }}" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          echo "Drain monitor exit code: $EXIT_CODE"
          if [ "$EXIT_CODE" != "0" ]; then
            echo "ERROR: Drain monitor exited $EXIT_CODE — queues not empty and --force not set"
            exit 1
          fi
          echo "Drain confirmed — safe to stop workers."

      # ── Step 3: Stop workers (queues confirmed empty) ─────────────────────
      # NOTE: libraryai-eep is always-on and is intentionally NOT stopped here.
      # It must remain reachable to accept uploads and serve the admin dashboard.
      - name: Stop workers (desired count → 0)
        run: |
          for SVC in eep-worker eep-recovery; do
            aws ecs update-service \
              --cluster "$ECS_CLUSTER" \
              --service "libraryai-${SVC}" \
              --desired-count 0 \
              --no-cli-pager
            echo "$SVC desired → 0"
          done
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services libraryai-eep-worker libraryai-eep-recovery
          echo "Workers stopped."

      # ── Step 4: Stop retraining-worker (if running) ──────────────────────
      - name: Stop retraining-worker
        run: |
          DESIRED=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services libraryai-retraining-worker \
            --query 'services[0].desiredCount' --output text 2>/dev/null || echo "0")
          if [ "$DESIRED" != "0" ] && [ "$DESIRED" != "None" ]; then
            aws ecs update-service \
              --cluster "$ECS_CLUSTER" \
              --service libraryai-retraining-worker \
              --desired-count 0 \
              --no-cli-pager
            aws ecs wait services-stable \
              --cluster "$ECS_CLUSTER" \
              --services libraryai-retraining-worker
            echo "retraining-worker stopped."
          else
            echo "retraining-worker already at 0 — skipping"
          fi

      # ── Step 5: Stop shadow-worker ────────────────────────────────────────
      - name: Stop shadow-worker
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service libraryai-shadow-worker \
            --desired-count 0 \
            --no-cli-pager
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services libraryai-shadow-worker
          echo "shadow-worker stopped."

      # ── Step 6: Stop CPU IEP services ────────────────────────────────────
      # NOTE: libraryai-iep1d is a CPU/Fargate service (on-demand rescue path).
      # It is always reset to 0 here as a safety cleanup even if desired-count is already 0.
      - name: Stop CPU IEP services (iep1d, iep1e, iep2a-v2, iep2b)
        run: |
          for SVC in libraryai-iep1d libraryai-iep1e libraryai-iep2a-v2 libraryai-iep2b; do
            aws ecs update-service \
              --cluster "$ECS_CLUSTER" \
              --service "$SVC" \
              --desired-count 0 \
              --no-cli-pager
            echo "libraryai-${SVC} desired → 0"
          done
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services libraryai-iep1d libraryai-iep1e libraryai-iep2a-v2 libraryai-iep2b
          echo "CPU IEP services stopped."

      # ── Step 7: Terminate RunPod GPU pods (iep0, iep1a, iep1b) ──────────
      - name: Terminate RunPod GPU pods
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          RUNPOD_POD_MODE: ${{ vars.RUNPOD_POD_MODE || 'create' }}
          RUNPOD_IEP0_POD_ID: ${{ vars.RUNPOD_IEP0_POD_ID || '' }}
          RUNPOD_IEP1A_POD_ID: ${{ vars.RUNPOD_IEP1A_POD_ID || '' }}
          RUNPOD_IEP1B_POD_ID: ${{ vars.RUNPOD_IEP1B_POD_ID || '' }}
        run: |
          set -euo pipefail

          if [ "$RUNPOD_POD_MODE" = "existing" ]; then
            IEP0_POD="$RUNPOD_IEP0_POD_ID"
            IEP1A_POD="$RUNPOD_IEP1A_POD_ID"
            IEP1B_POD="$RUNPOD_IEP1B_POD_ID"
            ACTION="stop"
            ACTION_PAST="Stopped"
          else
            ACTION="terminate"
            ACTION_PAST="Terminated"
          fi

          # Read pod IDs: terminate mode uses S3 (v1 + v2 list); existing mode uses repo vars (one id per role).
          POD_JSON="{}"
          if [ "$ACTION" = "terminate" ]; then
            POD_JSON=$(aws s3 cp s3://libraryai2/ops/runpod-pods.json - 2>/dev/null || echo "{}")
            ALL_POD_IDS=$(echo "$POD_JSON" | python3 "${GITHUB_WORKSPACE}/scripts/runpod_s3_state.py" list-ids)
          fi

          terminate_pod() {
            local POD_ID="$1" NAME="$2"
            if [ -z "$POD_ID" ]; then
              echo "$NAME: no pod ID found — skipping"
              return
            fi
            if [ "$ACTION" = "stop" ]; then
              curl -sf -X POST "https://api.runpod.io/graphql?api_key=${RUNPOD_API_KEY}" \
                -H "Content-Type: application/json" \
                -d "{\"query\":\"mutation { podStop(input: {podId: \\\"${POD_ID}\\\"}) { id desiredStatus } }\"}" \
                > /dev/null
            else
              curl -sf -X POST "https://api.runpod.io/graphql?api_key=${RUNPOD_API_KEY}" \
                -H "Content-Type: application/json" \
                -d "{\"query\":\"mutation { podTerminate(input: {podId: \\\"${POD_ID}\\\"}) }\"}" \
                > /dev/null
            fi
            echo "$ACTION_PAST $NAME pod: $POD_ID"
          }

          if [ "$ACTION" = "terminate" ]; then
            if [ -z "${ALL_POD_IDS//[$'\t\r\n']/}" ]; then
              echo "No RunPod pod IDs in s3://libraryai2/ops/runpod-pods.json — nothing to terminate."
            else
              while IFS= read -r POD_ID; do
                [ -z "$POD_ID" ] && continue
                terminate_pod "$POD_ID" "runpod"
              done <<< "$ALL_POD_IDS"
            fi
          else
            terminate_pod "$IEP0_POD"  "iep0"
            terminate_pod "$IEP1A_POD" "iep1a"
            terminate_pod "$IEP1B_POD" "iep1b"
          fi

          if [ "$ACTION" = "terminate" ]; then
            # Replace bookkeeping with empty v2 (safe clear; keeps schema for scale-up merge).
            printf '%s\n' '{"version":2,"pods":[]}' | aws s3 cp - s3://libraryai2/ops/runpod-pods.json
            echo "RunPod S3 bookkeeping cleared (version 2, empty pods array)."
          fi
          echo "RunPod pods handled with action=$ACTION."

      - name: Scale-down complete
        run: |
          echo "All processing services stopped."
          echo "Persistent services left running: EEP API, RDS, ElastiCache, S3."
          echo "RunPod GPU pods stopped or terminated."
