name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target (staging-only skips production promotion)"
        required: false
        default: "full"
        type: choice
        options: [full, staging-only]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION:    ${{ vars.AWS_REGION }}
  ACCOUNT_ID:    ${{ vars.AWS_ACCOUNT_ID }}
  ECR_REGISTRY:  ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com

# ---------------------------------------------------------------------------
# Shared OIDC credentials step — inlined into each job (GHA requirement).
# ---------------------------------------------------------------------------

jobs:
  # ── 1. unit + migration tests ──────────────────────────────────────────────
  test:
    uses: ./.github/workflows/ci.yml

  # ── 2. build and push all service images to ECR ───────────────────────────
  build-push:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: eep
            context: .
            dockerfile: services/eep/Dockerfile
          - service: eep-worker
            context: .
            dockerfile: services/eep_worker/Dockerfile
          - service: eep-recovery
            context: .
            dockerfile: services/eep_recovery/Dockerfile
          - service: shadow-worker
            context: .
            dockerfile: services/shadow_worker/Dockerfile
          - service: retraining-worker
            context: .
            dockerfile: services/retraining_worker/Dockerfile
          - service: iep0
            context: .
            dockerfile: services/iep0/Dockerfile
            push_dockerhub: true
          - service: iep1a
            context: .
            dockerfile: services/iep1a/Dockerfile
            push_dockerhub: true
          - service: iep1b
            context: .
            dockerfile: services/iep1b/Dockerfile
            push_dockerhub: true
          - service: iep1d
            context: .
            dockerfile: services/iep1d/Dockerfile
          - service: iep1e
            context: .
            dockerfile: services/iep1e/Dockerfile
            push_dockerhub: true
            build-args: |
              ENABLE_REAL_MODEL=true
          - service: dataset-builder
            context: .
            dockerfile: services/dataset_builder/Dockerfile
          - service: iep2a
            context: .
            dockerfile: services/iep2a/Dockerfile
            push_dockerhub: true
            build-args: |
              ENABLE_REAL_MODEL=true
              ENABLE_PADDLE_BACKEND=true
          - service: iep2b
            context: .
            dockerfile: services/iep2b/Dockerfile
            push_dockerhub: true
            build-args: |
              ENABLE_REAL_MODEL=true
          - service: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
            build-args: |
              NEXT_PUBLIC_API_BASE_URL=${{ vars.NEXT_PUBLIC_API_BASE_URL }}
          - service: mlflow
            context: .
            dockerfile: services/mlflow/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Log in to Docker Hub
        if: matrix.push_dockerhub == true
        uses: docker/login-action@v3
        with:
          username: gma51
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Model-weight download (iep0 / iep1a / iep1b / iep1e / iep1d / iep2a / iep2b) ──
      # Weights are NOT committed to Git (see .gitignore).  They must be stored
      # in S3 and referenced via GitHub Actions repository variables:
      #
      #   IEP0_WEIGHTS_URI    s3://libraryai2/models/iep0/iep0-models.tar.gz    (flat tar.gz)
      #   IEP1A_WEIGHTS_URI   s3://libraryai2/models/iep1a/iep1a-models.tar.gz  (flat tar.gz)
      #   IEP1B_WEIGHTS_URI   s3://libraryai2/models/iep1b/iep1b-models.tar.gz  (flat tar.gz)
      #   IEP1E_WEIGHTS_URI   s3://libraryai2/models/iep1e/iep1e-models.tar.gz  (flat tar.gz)
      #   IEP1D_WEIGHTS_URI   s3://…/iep1d/best_model.pkl                       (single file)
      #   IEP2A_WEIGHTS_URI   s3://…/iep2a/pp-doclayoutv2.tar.gz               (tar.gz archive)
      #     Archive must contain one top-level directory whose contents unpack to:
      #       models/iep2a/paddle/PP-DocLayoutV2/{config.json,inference.yml,inference.pdiparams,…}
      #   IEP2B_WEIGHTS_URI   s3://…/iep2b/doclayout_yolo_docstructbench_imgsz1024.pt (single file)
      #
      # IMPORTANT — archive format for iep0 / iep1a / iep1b / iep1e:
      #   Archives were created with: tar -czf archive.tar.gz -C models/<svc> .
      #   Contents are relative to the model directory (no top-level wrapper directory).
      #   Extract with: tar -xzf "$ARCHIVE" -C "$DEST_DIR"  (do NOT use --strip-components=1)
      #
      # Optional SHA-256 checksums (verified before extraction / use):
      #   IEP0_WEIGHTS_SHA256 / IEP1A_WEIGHTS_SHA256 / IEP1B_WEIGHTS_SHA256 / IEP1E_WEIGHTS_SHA256
      #   IEP1D_WEIGHTS_SHA256 / IEP2A_WEIGHTS_SHA256 / IEP2B_WEIGHTS_SHA256
      #
      # IAM requirement: the github-actions-deploy OIDC role needs
      #   s3:GetObject on arn:aws:s3:::libraryai2/models/iep*
      # No long-lived keys — OIDC credentials from the step above are reused.
      - name: Download model weights
        if: contains(fromJSON('["iep0","iep1a","iep1b","iep1e","iep1d","iep2a","iep2b"]'), matrix.service)
        env:
          IEP0_WEIGHTS_URI:     ${{ vars.IEP0_WEIGHTS_URI }}
          IEP1A_WEIGHTS_URI:    ${{ vars.IEP1A_WEIGHTS_URI }}
          IEP1B_WEIGHTS_URI:    ${{ vars.IEP1B_WEIGHTS_URI }}
          IEP1E_WEIGHTS_URI:    ${{ vars.IEP1E_WEIGHTS_URI }}
          IEP1D_WEIGHTS_URI:    ${{ vars.IEP1D_WEIGHTS_URI }}
          IEP2A_WEIGHTS_URI:    ${{ vars.IEP2A_WEIGHTS_URI }}
          IEP2B_WEIGHTS_URI:    ${{ vars.IEP2B_WEIGHTS_URI }}
          IEP0_WEIGHTS_SHA256:  ${{ vars.IEP0_WEIGHTS_SHA256 }}
          IEP1A_WEIGHTS_SHA256: ${{ vars.IEP1A_WEIGHTS_SHA256 }}
          IEP1B_WEIGHTS_SHA256: ${{ vars.IEP1B_WEIGHTS_SHA256 }}
          IEP1E_WEIGHTS_SHA256: ${{ vars.IEP1E_WEIGHTS_SHA256 }}
          IEP1D_WEIGHTS_SHA256: ${{ vars.IEP1D_WEIGHTS_SHA256 }}
          IEP2A_WEIGHTS_SHA256: ${{ vars.IEP2A_WEIGHTS_SHA256 }}
          IEP2B_WEIGHTS_SHA256: ${{ vars.IEP2B_WEIGHTS_SHA256 }}
        run: |
          set -euo pipefail
          SVC="${{ matrix.service }}"

          # ── Helper: flat tar.gz download → extract → verify ────────────────
          # Archives for iep0/iep1a/iep1b/iep1e were created with:
          #   tar -czf archive.tar.gz -C models/<svc> .
          # so contents are relative to the model dir; no --strip-components needed.
          download_flat_tar() {
            local URI="$1" SHA256="$2" ARCHIVE="$3" DEST_DIR="$4"
            shift 4
            local REQ_FILES=("$@")

            if [ -z "$URI" ]; then
              echo "::error::$(echo "$ARCHIVE" | sed 's|/tmp/||;s|-weights.tar.gz||') weight URI not set. Add the corresponding WEIGHTS_URI variable in GitHub → Settings → Actions → Variables."
              exit 1
            fi

            mkdir -p "$DEST_DIR"
            echo "Downloading $(basename "$ARCHIVE") → $ARCHIVE"
            aws s3 cp "$URI" "$ARCHIVE"
            test -s "$ARCHIVE" || { echo "::error::Downloaded archive is empty: $ARCHIVE"; exit 1; }

            if [ -n "$SHA256" ]; then
              echo "$SHA256  $ARCHIVE" | sha256sum --check --strict
              echo "Checksum OK."
            else
              echo "No checksum configured — skipping verification."
            fi

            # Flat archive: contents are relative to model dir — do NOT strip components.
            tar -xzf "$ARCHIVE" -C "$DEST_DIR"
            rm -f "$ARCHIVE"

            for req in "${REQ_FILES[@]}"; do
              if ! test -f "$req"; then
                echo "::error::Required model file missing after extraction: $req"
                exit 1
              fi
            done
            echo "Model files verified."
          }

          # ── IEP0: flat tar.gz → models/iep0/ ─────────────────────────────
          if [ "$SVC" = "iep0" ]; then
            download_flat_tar \
              "${IEP0_WEIGHTS_URI:-}" \
              "${IEP0_WEIGHTS_SHA256:-}" \
              "/tmp/iep0-weights.tar.gz" \
              "models/iep0" \
              "models/iep0/classifier.pt"

          # ── IEP1A: flat tar.gz → models/iep1a/ ───────────────────────────
          elif [ "$SVC" = "iep1a" ]; then
            download_flat_tar \
              "${IEP1A_WEIGHTS_URI:-}" \
              "${IEP1A_WEIGHTS_SHA256:-}" \
              "/tmp/iep1a-weights.tar.gz" \
              "models/iep1a" \
              "models/iep1a/Book_segmentation.pt" \
              "models/iep1a/Newspaper_Segmentation.pt" \
              "models/iep1a/Segmentation_microfilm.pt"

          # ── IEP1B: flat tar.gz → models/iep1b/ ───────────────────────────
          elif [ "$SVC" = "iep1b" ]; then
            download_flat_tar \
              "${IEP1B_WEIGHTS_URI:-}" \
              "${IEP1B_WEIGHTS_SHA256:-}" \
              "/tmp/iep1b-weights.tar.gz" \
              "models/iep1b" \
              "models/iep1b/Book_keypoint.pt" \
              "models/iep1b/Microfilm_Keypoints.pt" \
              "models/iep1b/Newspaper_Keypoints.pt"

          # ── IEP1E: flat tar.gz → models/iep1e/ ───────────────────────────
          elif [ "$SVC" = "iep1e" ]; then
            download_flat_tar \
              "${IEP1E_WEIGHTS_URI:-}" \
              "${IEP1E_WEIGHTS_SHA256:-}" \
              "/tmp/iep1e-weights.tar.gz" \
              "models/iep1e" \
              "models/iep1e/det/inference.pdiparams" \
              "models/iep1e/det/inference.pdiparams.info" \
              "models/iep1e/det/inference.pdmodel" \
              "models/iep1e/rec/inference.pdiparams" \
              "models/iep1e/rec/inference.pdiparams.info" \
              "models/iep1e/rec/inference.pdmodel"

          # ── IEP2A: tar.gz archive → models/iep2a/paddle/PP-DocLayoutV2/ ──
          elif [ "$SVC" = "iep2a" ]; then
            URI="${IEP2A_WEIGHTS_URI:-}"
            SHA256="${IEP2A_WEIGHTS_SHA256:-}"
            DEST_DIR="models/iep2a/paddle/PP-DocLayoutV2"
            ARCHIVE="/tmp/iep2a-weights.tar.gz"

            if [ -z "$URI" ]; then
              echo "::error::IEP2A_WEIGHTS_URI not set. Add it in GitHub → Settings → Actions → Variables."
              exit 1
            fi

            mkdir -p "$DEST_DIR"
            echo "Downloading iep2a archive → $ARCHIVE"
            aws s3 cp "$URI" "$ARCHIVE"
            test -s "$ARCHIVE" || { echo "::error::Downloaded iep2a archive is empty: $ARCHIVE"; exit 1; }

            if [ -n "$SHA256" ]; then
              echo "$SHA256  $ARCHIVE" | sha256sum --check --strict
              echo "iep2a checksum OK."
            else
              echo "No checksum configured for iep2a — skipping verification."
            fi

            # Archive is expected to have one top-level directory; --strip-components=1
            # drops it so contents land directly in $DEST_DIR.
            tar -xzf "$ARCHIVE" -C "$DEST_DIR" --strip-components=1
            rm -f "$ARCHIVE"

            for required in config.json inference.yml inference.pdiparams; do
              if ! test -f "$DEST_DIR/$required"; then
                echo "::error::Required iep2a model file missing after extraction: $DEST_DIR/$required"
                exit 1
              fi
            done
            echo "iep2a model files verified."

          # ── IEP1D / IEP2B: single-file download ─────────────────────────
          else
            case "$SVC" in
              iep1d)
                URI="${IEP1D_WEIGHTS_URI:-}"
                DEST="models/iep1d/best_model.pkl"
                SHA256="${IEP1D_WEIGHTS_SHA256:-}"
                ;;
              iep2b)
                URI="${IEP2B_WEIGHTS_URI:-}"
                DEST="models/iep2b/doclayout_yolo_docstructbench_imgsz1024.pt"
                SHA256="${IEP2B_WEIGHTS_SHA256:-}"
                ;;
            esac

            if [ -z "${URI:-}" ]; then
              echo "::error::${SVC} weight URI not set. Add the corresponding WEIGHTS_URI variable in GitHub → Settings → Actions → Variables."
              exit 1
            fi

            mkdir -p "$(dirname "$DEST")"
            echo "Downloading $SVC weights → $DEST"
            aws s3 cp "$URI" "$DEST"
            test -s "$DEST" || { echo "::error::Downloaded weight file is empty or missing: $DEST"; exit 1; }

            if [ -n "${SHA256:-}" ]; then
              echo "$SHA256  $DEST" | sha256sum --check --strict
              echo "$SVC checksum OK."
            else
              echo "No checksum configured for $SVC — skipping verification."
            fi
          fi

      - name: Build and push libraryai-${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/libraryai-${{ matrix.service }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/libraryai-${{ matrix.service }}:latest
          build-args: ${{ matrix.build-args }}
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/libraryai-${{ matrix.service }}:latest
          cache-to: type=inline

      - name: Push to Docker Hub (gma51)
        if: matrix.push_dockerhub == true
        run: |
          docker pull ${{ env.ECR_REGISTRY }}/libraryai-${{ matrix.service }}:latest
          docker tag ${{ env.ECR_REGISTRY }}/libraryai-${{ matrix.service }}:latest gma51/libraryai-${{ matrix.service }}:latest
          docker push gma51/libraryai-${{ matrix.service }}:latest

  # ── 3. migrate staging database ───────────────────────────────────────────
  migrate-staging:
    needs: build-push
    runs-on: ubuntu-latest
    env:
      CLUSTER: ${{ vars.ECS_CLUSTER_STAGING }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: ${{ vars.AWS_REGION }}

      - name: Register migration task definition
        id: reg-migration
        run: |
          TASK_DEF=$(cat k8s/ecs/migration-task-def.json \
            | sed "s/ACCOUNT_ID/${{ vars.AWS_ACCOUNT_ID }}/g" \
            | sed "s/REGION/${{ vars.AWS_REGION }}/g" \
            | sed 's|:latest|:${{ github.sha }}|g')
          ARN=$(aws ecs register-task-definition \
            --cli-input-json "$TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "arn=$ARN" >> "$GITHUB_OUTPUT"

      - name: Run migration task on staging
        id: run-migration
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER" \
            --task-definition ${{ steps.reg-migration.outputs.arn }} \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ vars.ECS_SUBNETS }}],securityGroups=[${{ vars.ECS_SECURITY_GROUPS }}],assignPublicIp=DISABLED}" \
            --query 'tasks[0].taskArn' --output text)
          echo "task_arn=$TASK_ARN" >> "$GITHUB_OUTPUT"

      - name: Wait for migration to complete
        run: |
          aws ecs wait tasks-stopped \
            --cluster "$CLUSTER" \
            --tasks ${{ steps.run-migration.outputs.task_arn }}

      - name: Assert migration exit code 0
        run: |
          EXIT=$(aws ecs describe-tasks \
            --cluster "$CLUSTER" \
            --tasks ${{ steps.run-migration.outputs.task_arn }} \
            --query 'tasks[0].containers[0].exitCode' --output text)
          if [ "$EXIT" != "0" ]; then
            echo "Staging migration exited with code $EXIT — aborting"
            exit 1
          fi
          echo "Staging migration succeeded (exit 0)"

  # ── 4. deploy to staging ECS cluster ──────────────────────────────────────
  deploy-staging:
    needs: migrate-staging
    runs-on: ubuntu-latest
    env:
      CLUSTER: ${{ vars.ECS_CLUSTER_STAGING }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: ${{ vars.AWS_REGION }}

      - name: Register and update all task definitions (staging)
        run: |
          set -e

          sc_config() {
            local svc=$1
            case "$svc" in
              eep)      echo '{"enabled":true,"namespace":"libraryai.local","services":[{"portName":"http","discoveryName":"eep","clientAliases":[{"port":8000,"dnsName":"eep"}]}]}' ;;
              iep0)     echo '{"enabled":true,"namespace":"libraryai.local","services":[{"portName":"http","discoveryName":"iep0","clientAliases":[{"port":8006,"dnsName":"iep0"}]}]}' ;;
              iep1a)    echo '{"enabled":true,"namespace":"libraryai.local","services":[{"portName":"http","discoveryName":"iep1a","clientAliases":[{"port":8001,"dnsName":"iep1a"}]}]}' ;;
              iep1b)    echo '{"enabled":true,"namespace":"libraryai.local","services":[{"portName":"http","discoveryName":"iep1b","clientAliases":[{"port":8002,"dnsName":"iep1b"}]}]}' ;;
              iep1d)    echo '{"enabled":true,"namespace":"libraryai.local","services":[{"portName":"http","discoveryName":"iep1d","clientAliases":[{"port":8003,"dnsName":"iep1d"}]}]}' ;;
              iep1e)    echo '{"enabled":true,"namespace":"libraryai.local","services":[{"portName":"http","discoveryName":"iep1e","clientAliases":[{"port":8007,"dnsName":"iep1e"}]}]}' ;;
              iep2a)    echo '{"enabled":true,"namespace":"libraryai.local","services":[{"portName":"http","discoveryName":"iep2a","clientAliases":[{"port":8004,"dnsName":"iep2a"}]}]}' ;;
              iep2b)    echo '{"enabled":true,"namespace":"libraryai.local","services":[{"portName":"http","discoveryName":"iep2b","clientAliases":[{"port":8005,"dnsName":"iep2b"}]}]}' ;;
              frontend) echo '{"enabled":true,"namespace":"libraryai.local","services":[{"portName":"http","discoveryName":"frontend","clientAliases":[{"port":3000,"dnsName":"frontend"}]}]}' ;;
              mlflow)   echo '{"enabled":true,"namespace":"libraryai.local","services":[{"portName":"http","discoveryName":"mlflow","clientAliases":[{"port":5000,"dnsName":"mlflow.libraryai.local"}]}]}' ;;
              *)        echo '{"enabled":true,"namespace":"libraryai.local"}' ;;
            esac
          }

          SERVICES=(
            eep eep-worker eep-recovery shadow-worker retraining-worker
            dataset-builder frontend iep0 iep1a iep1b iep1d iep1e iep2a iep2b mlflow
          )
          for SVC in "${SERVICES[@]}"; do
            FILE="k8s/ecs/${SVC}-task-def.json"
            TASK_DEF=$(cat "$FILE" \
              | sed "s/ACCOUNT_ID/${{ vars.AWS_ACCOUNT_ID }}/g" \
              | sed "s/REGION/${{ vars.AWS_REGION }}/g" \
              | sed "s/CLUSTER_NAME/${CLUSTER}/g" \
              | sed 's|:latest|:${{ github.sha }}|g' \
              | sed "s|IEP0_URL_VALUE|${{ vars.IEP0_URL || 'http://iep0:8006' }}|g" \
              | sed "s|IEP1A_URL_VALUE|${{ vars.IEP1A_URL || 'http://iep1a:8001' }}|g" \
              | sed "s|IEP1B_URL_VALUE|${{ vars.IEP1B_URL || 'http://iep1b:8002' }}|g" \
              | sed "s|IEP1E_URL_VALUE|${{ vars.IEP1E_URL || 'http://iep1e:8007' }}|g" \
              | sed "s|IEP2A_URL_VALUE|${{ vars.IEP2A_URL || 'http://iep2a:8004' }}|g" \
              | sed "s|IEP2B_URL_VALUE|${{ vars.IEP2B_URL || 'http://iep2b:8005' }}|g" \
              | sed "s|RUNPOD_POD_MODE_VALUE|${{ vars.RUNPOD_POD_MODE || 'create' }}|g" \
              | sed "s|RUNPOD_IEP0_POD_ID_VALUE|${{ vars.RUNPOD_IEP0_POD_ID || '' }}|g" \
              | sed "s|RUNPOD_IEP1A_POD_ID_VALUE|${{ vars.RUNPOD_IEP1A_POD_ID || '' }}|g" \
              | sed "s|RUNPOD_IEP1B_POD_ID_VALUE|${{ vars.RUNPOD_IEP1B_POD_ID || '' }}|g" \
              | sed "s|RUNPOD_GPU_TYPE_ID_VALUE|${{ vars.RUNPOD_GPU_TYPE_ID || 'NVIDIA GeForce RTX 3080' }}|g" \
              | sed "s|RUNPOD_CLOUD_TYPE_VALUE|${{ vars.RUNPOD_CLOUD_TYPE || 'COMMUNITY' }}|g" \
              | sed "s|GOOGLE_ENABLED_VALUE|${{ vars.GOOGLE_ENABLED || 'false' }}|g" \
              | sed "s|GOOGLE_PROJECT_ID_VALUE|${{ vars.GOOGLE_PROJECT_ID || '' }}|g" \
              | sed "s|GOOGLE_PROCESSOR_ID_LAYOUT_VALUE|${{ vars.GOOGLE_PROCESSOR_ID_LAYOUT || '' }}|g")
            REVISION=$(aws ecs register-task-definition \
              --cli-input-json "$TASK_DEF" \
              --query 'taskDefinition.taskDefinitionArn' --output text)
            echo "Registered $REVISION"

            if aws ecs describe-services \
                --cluster "$CLUSTER" \
                --services "libraryai-${SVC}" \
                --query 'services[0].status' --output text 2>/dev/null \
                | grep -qE "ACTIVE|DRAINING"; then
              SC=$(sc_config "$SVC")
              DESIRED_ARGS=()
              case "$SVC" in
                eep-worker|eep-recovery|shadow-worker|retraining-worker|dataset-builder|iep0|iep1a|iep1b|iep1d|iep1e|iep2a|iep2b)
                  DESIRED_ARGS=(--desired-count 0)
                  ;;
              esac
              aws ecs update-service \
                --cluster "$CLUSTER" \
                --service "libraryai-${SVC}" \
                "${DESIRED_ARGS[@]}" \
                --task-definition "$REVISION" \
                --service-connect-configuration "$SC" \
                --force-new-deployment \
                --no-cli-pager
              echo "Updated staging service libraryai-${SVC}"
            else
              echo "libraryai-${SVC} not yet created in staging — skipping update"
            fi
          done

      - name: Ensure staging processing services are stopped
        run: |
          set -e
          # Deploy only refreshes task definitions for off-by-default processing
          # services. Immediate processing scale-up is owned by normal_scaler.py,
          # which injects live RunPod URLs before starting eep-worker.
          for SVC in eep-worker eep-recovery shadow-worker retraining-worker dataset-builder iep0 iep1a iep1b iep1d iep1e iep2a iep2b; do
            if aws ecs describe-services \
                --cluster "$CLUSTER" \
                --services "libraryai-${SVC}" \
                --query 'services[0].status' --output text 2>/dev/null \
                | grep -qE "ACTIVE|DRAINING"; then
              aws ecs update-service \
                --cluster "$CLUSTER" \
                --service "libraryai-${SVC}" \
                --desired-count 0 \
                --no-cli-pager
              echo "libraryai-${SVC} desired -> 0"
            else
              echo "libraryai-${SVC} not present in staging — skipping"
            fi
          done

      - name: Wait for staging services to stabilise
        run: |
          # Only wait for Fargate services that deploy.yml is responsible for.
          # GPU/EC2 IEPs (iep0, iep1a, iep1b) and batch-only services are
          # managed by scale-up/scale-down and may have desired>0 from a prior
          # scale-up without GPU capacity available — excluding them avoids a
          # guaranteed timeout.
          CORE_SVCS=(eep frontend retraining-worker)
          ACTIVE=()
          for SVC in "${CORE_SVCS[@]}"; do
            DESIRED=$(aws ecs describe-services \
              --cluster "$CLUSTER" \
              --services "libraryai-${SVC}" \
              --query 'services[0].desiredCount' --output text 2>/dev/null || echo "0")
            if [ "$DESIRED" != "0" ] && [ "$DESIRED" != "None" ]; then
              ACTIVE+=("libraryai-${SVC}")
            fi
          done
          if [ ${#ACTIVE[@]} -gt 0 ]; then
            echo "Waiting for stable: ${ACTIVE[*]}"
            aws ecs wait services-stable \
              --cluster "$CLUSTER" \
              --services "${ACTIVE[@]}"
          else
            echo "No core staging services currently running — skipping stability wait"
          fi

  # ── 5. Admin bootstrap ────────────────────────────────────────────────────
  bootstrap-admin-staging:
    needs: deploy-staging
    runs-on: ubuntu-latest
    env:
      CLUSTER: ${{ vars.ECS_CLUSTER_STAGING }}
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: ${{ vars.AWS_REGION }}

      - name: Run admin bootstrap task (idempotent)
        run: |
          TASK_DEF_ARN=$(aws ecs list-task-definitions \
            --family-prefix libraryai-migration \
            --sort DESC \
            --query 'taskDefinitionArns[0]' \
            --output text)

          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER" \
            --task-definition "$TASK_DEF_ARN" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ vars.ECS_SUBNETS }}],securityGroups=[${{ vars.ECS_SECURITY_GROUPS }}],assignPublicIp=DISABLED}" \
            --overrides "{\"containerOverrides\":[{\"name\":\"migration\",\"command\":[\"python\",\"-m\",\"scripts.create_admin\",\"--skip-if-exists\"],\"environment\":[{\"name\":\"BOOTSTRAP_ADMIN_USERNAME\",\"value\":\"admin\"},{\"name\":\"BOOTSTRAP_ADMIN_PASSWORD\",\"value\":\"${{ secrets.BOOTSTRAP_ADMIN_PASSWORD }}\"}]}]}" \
            --query 'tasks[0].taskArn' --output text)

          echo "Bootstrap task: $TASK_ARN"
          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$TASK_ARN"

          EXIT=$(aws ecs describe-tasks \
            --cluster "$CLUSTER" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)
          [ "$EXIT" = "0" ] || { echo "Admin bootstrap failed (exit $EXIT)"; exit 1; }
          echo "Admin bootstrap OK"

  # ── 6. end-to-end tests against staging ───────────────────────────────────
  # TODO: expand E2E coverage to full upload→process→download cycle:
  #   - Upload a real TIFF via POST /v1/jobs, wait for state=completed
  #   - Assert page_lineage records written and output artifact downloadable from S3
  #   - Requires E2E_FIXTURE_URI set to an s3:// URI of a known test image
  e2e-tests:
    needs: bootstrap-admin-staging
    runs-on: ubuntu-latest
    env:
      BASE_URL: http://${{ vars.ALB_DNS_STAGING }}
      E2E_FIXTURE_URI: ${{ vars.E2E_FIXTURE_URI }}
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: ${{ vars.AWS_REGION }}

      - name: Health check
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$BASE_URL/health")
          [ "$STATUS" = "200" ] || { echo "Health check failed: HTTP $STATUS"; exit 1; }
          echo "Health OK"

      - name: Status check
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$BASE_URL/v1/status")
          [ "$STATUS" = "200" ] || { echo "Status check failed: HTTP $STATUS"; exit 1; }
          echo "Status OK"

      - name: Admin login — obtain JWT
        id: auth
        run: |
          RESP=$(curl -sf -X POST "$BASE_URL/v1/auth/token" \
            --data "username=admin&password=${{ secrets.BOOTSTRAP_ADMIN_PASSWORD }}")
          TOKEN=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
          echo "Admin login OK"

      - name: Admin API — queue-status accessible
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            "$BASE_URL/v1/admin/queue-status")
          [ "$STATUS" = "200" ] || { echo "queue-status failed: HTTP $STATUS"; exit 1; }
          echo "Admin queue-status OK"

      - name: Submit E2E test job
        id: submit
        run: |
          [ -n "$E2E_FIXTURE_URI" ] || { echo "::error::E2E_FIXTURE_URI is not set — add it as a GitHub Actions variable"; exit 1; }
          # Strip any trailing whitespace/CR that GitHub Actions may append to variable values,
          # then use python3 to build the JSON body so special characters are always safe.
          FIXTURE_URI=$(printf '%s' "$E2E_FIXTURE_URI" | tr -d '\r\n ')
          REQUEST_BODY=$(python3 -c "import json,sys; print(json.dumps({'collection_id':'e2e-smoke-test','material_type':'book','policy_version':'e2e-v1','pages':[{'page_number':1,'input_uri':sys.argv[1]}]}))" "$FIXTURE_URI")
          RESP=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST "$BASE_URL/v1/jobs" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d "$REQUEST_BODY")
          HTTP_STATUS=$(echo "$RESP" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESP" | sed '/HTTP_STATUS:/d')
          echo "HTTP $HTTP_STATUS — $BODY"
          [ "$HTTP_STATUS" = "201" ] || { echo "Job submit failed: HTTP $HTTP_STATUS"; exit 1; }
          JOB_ID=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])")
          echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"
          echo "Job submitted: $JOB_ID"

      - name: Poll job status until queued or processing (max 60 s)
        run: |
          for i in $(seq 1 12); do
            STATE=$(curl -sf \
              -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
              "$BASE_URL/v1/jobs/${{ steps.submit.outputs.job_id }}" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('summary',{}).get('status',''))")
            echo "Poll $i: state=$STATE"
            case "$STATE" in
              queued|running) echo "Pipeline is moving — E2E passed"; exit 0 ;;
              failed) echo "Job reached terminal failure state: $STATE"; exit 1 ;;
            esac
            sleep 5
          done
          echo "Job did not progress past 'pending' within 60 s"
          exit 1

  # ── 6a. rollback staging if E2E failed ────────────────────────────────────
  rollback-staging:
    needs: e2e-tests
    if: always() && needs.e2e-tests.result == 'failure'
    runs-on: ubuntu-latest
    env:
      CLUSTER: ${{ vars.ECS_CLUSTER_STAGING }}
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: ${{ vars.AWS_REGION }}

      - name: Stop staging workers (EEP API intentionally left running)
        run: |
          echo "E2E tests failed — stopping processing workers in staging."
          echo "libraryai-eep is NOT touched: the API must remain reachable for diagnostics."
          for SVC in eep-worker eep-recovery shadow-worker iep0 iep1a iep1b iep1d iep1e iep2a iep2b; do
            DESIRED=$(aws ecs describe-services \
              --cluster "$CLUSTER" \
              --services "libraryai-${SVC}" \
              --query 'services[0].desiredCount' --output text 2>/dev/null || echo "0")
            if [ "$DESIRED" != "0" ] && [ "$DESIRED" != "None" ]; then
              aws ecs update-service \
                --cluster "$CLUSTER" \
                --service "libraryai-${SVC}" \
                --desired-count 0 \
                --no-cli-pager || true
              echo "libraryai-${SVC} → 0"
            fi
          done
          echo "Rollback complete. EEP API still running. Investigate staging before re-promoting."

  # ── 6b. migrate production database (only on E2E pass) ────────────────────
  migrate-production:
    needs: e2e-tests
    if: |
      needs.e2e-tests.result == 'success' &&
      vars.ECS_CLUSTER_PROD != '' &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.target == 'full')
    runs-on: ubuntu-latest
    env:
      CLUSTER: ${{ vars.ECS_CLUSTER_PROD }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: ${{ vars.AWS_REGION }}

      - name: Register migration task definition
        id: reg-migration
        run: |
          TASK_DEF=$(cat k8s/ecs/migration-task-def.json \
            | sed "s/ACCOUNT_ID/${{ vars.AWS_ACCOUNT_ID }}/g" \
            | sed "s/REGION/${{ vars.AWS_REGION }}/g" \
            | sed 's|:latest|:${{ github.sha }}|g')
          ARN=$(aws ecs register-task-definition \
            --cli-input-json "$TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "arn=$ARN" >> "$GITHUB_OUTPUT"

      - name: Run migration task on production
        id: run-migration
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER" \
            --task-definition ${{ steps.reg-migration.outputs.arn }} \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ vars.ECS_SUBNETS }}],securityGroups=[${{ vars.ECS_SECURITY_GROUPS }}],assignPublicIp=DISABLED}" \
            --query 'tasks[0].taskArn' --output text)
          echo "task_arn=$TASK_ARN" >> "$GITHUB_OUTPUT"

      - name: Wait for production migration to complete
        run: |
          aws ecs wait tasks-stopped \
            --cluster "$CLUSTER" \
            --tasks ${{ steps.run-migration.outputs.task_arn }}

      - name: Assert production migration exit code 0
        run: |
          EXIT=$(aws ecs describe-tasks \
            --cluster "$CLUSTER" \
            --tasks ${{ steps.run-migration.outputs.task_arn }} \
            --query 'tasks[0].containers[0].exitCode' --output text)
          if [ "$EXIT" != "0" ]; then
            echo "Production migration exited with code $EXIT — aborting production deploy"
            exit 1
          fi
          echo "Production migration succeeded (exit 0)"

  # ── 7. deploy to production ECS cluster ───────────────────────────────────
  deploy-production:
    needs: migrate-production
    runs-on: ubuntu-latest
    env:
      CLUSTER: ${{ vars.ECS_CLUSTER_PROD }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: ${{ vars.AWS_REGION }}

      - name: Register and update all task definitions (production)
        run: |
          set -e

          sc_config() {
            local svc=$1
            case "$svc" in
              eep)      echo '{"enabled":true,"namespace":"libraryai.local","services":[{"portName":"http","discoveryName":"eep","clientAliases":[{"port":8000,"dnsName":"eep"}]}]}' ;;
              iep0)     echo '{"enabled":true,"namespace":"libraryai.local","services":[{"portName":"http","discoveryName":"iep0","clientAliases":[{"port":8006,"dnsName":"iep0"}]}]}' ;;
              iep1a)    echo '{"enabled":true,"namespace":"libraryai.local","services":[{"portName":"http","discoveryName":"iep1a","clientAliases":[{"port":8001,"dnsName":"iep1a"}]}]}' ;;
              iep1b)    echo '{"enabled":true,"namespace":"libraryai.local","services":[{"portName":"http","discoveryName":"iep1b","clientAliases":[{"port":8002,"dnsName":"iep1b"}]}]}' ;;
              iep1d)    echo '{"enabled":true,"namespace":"libraryai.local","services":[{"portName":"http","discoveryName":"iep1d","clientAliases":[{"port":8003,"dnsName":"iep1d"}]}]}' ;;
              iep1e)    echo '{"enabled":true,"namespace":"libraryai.local","services":[{"portName":"http","discoveryName":"iep1e","clientAliases":[{"port":8007,"dnsName":"iep1e"}]}]}' ;;
              iep2a)    echo '{"enabled":true,"namespace":"libraryai.local","services":[{"portName":"http","discoveryName":"iep2a","clientAliases":[{"port":8004,"dnsName":"iep2a"}]}]}' ;;
              iep2b)    echo '{"enabled":true,"namespace":"libraryai.local","services":[{"portName":"http","discoveryName":"iep2b","clientAliases":[{"port":8005,"dnsName":"iep2b"}]}]}' ;;
              frontend) echo '{"enabled":true,"namespace":"libraryai.local","services":[{"portName":"http","discoveryName":"frontend","clientAliases":[{"port":3000,"dnsName":"frontend"}]}]}' ;;
              mlflow)   echo '{"enabled":true,"namespace":"libraryai.local","services":[{"portName":"http","discoveryName":"mlflow","clientAliases":[{"port":5000,"dnsName":"mlflow.libraryai.local"}]}]}' ;;
              *)        echo '{"enabled":true,"namespace":"libraryai.local"}' ;;
            esac
          }

          SERVICES=(
            eep eep-worker eep-recovery shadow-worker retraining-worker
            dataset-builder frontend iep0 iep1a iep1b iep1d iep1e iep2a iep2b mlflow
          )
          for SVC in "${SERVICES[@]}"; do
            FILE="k8s/ecs/${SVC}-task-def.json"
            TASK_DEF=$(cat "$FILE" \
              | sed "s/ACCOUNT_ID/${{ vars.AWS_ACCOUNT_ID }}/g" \
              | sed "s/REGION/${{ vars.AWS_REGION }}/g" \
              | sed "s/CLUSTER_NAME/${CLUSTER}/g" \
              | sed 's|:latest|:${{ github.sha }}|g' \
              | sed "s|IEP0_URL_VALUE|${{ vars.IEP0_URL || 'http://iep0:8006' }}|g" \
              | sed "s|IEP1A_URL_VALUE|${{ vars.IEP1A_URL || 'http://iep1a:8001' }}|g" \
              | sed "s|IEP1B_URL_VALUE|${{ vars.IEP1B_URL || 'http://iep1b:8002' }}|g" \
              | sed "s|IEP1E_URL_VALUE|${{ vars.IEP1E_URL || 'http://iep1e:8007' }}|g" \
              | sed "s|IEP2A_URL_VALUE|${{ vars.IEP2A_URL || 'http://iep2a:8004' }}|g" \
              | sed "s|IEP2B_URL_VALUE|${{ vars.IEP2B_URL || 'http://iep2b:8005' }}|g" \
              | sed "s|RUNPOD_POD_MODE_VALUE|${{ vars.RUNPOD_POD_MODE || 'create' }}|g" \
              | sed "s|RUNPOD_IEP0_POD_ID_VALUE|${{ vars.RUNPOD_IEP0_POD_ID || '' }}|g" \
              | sed "s|RUNPOD_IEP1A_POD_ID_VALUE|${{ vars.RUNPOD_IEP1A_POD_ID || '' }}|g" \
              | sed "s|RUNPOD_IEP1B_POD_ID_VALUE|${{ vars.RUNPOD_IEP1B_POD_ID || '' }}|g" \
              | sed "s|RUNPOD_GPU_TYPE_ID_VALUE|${{ vars.RUNPOD_GPU_TYPE_ID || 'NVIDIA GeForce RTX 3080' }}|g" \
              | sed "s|RUNPOD_CLOUD_TYPE_VALUE|${{ vars.RUNPOD_CLOUD_TYPE || 'COMMUNITY' }}|g" \
              | sed "s|GOOGLE_ENABLED_VALUE|${{ vars.GOOGLE_ENABLED || 'false' }}|g" \
              | sed "s|GOOGLE_PROJECT_ID_VALUE|${{ vars.GOOGLE_PROJECT_ID || '' }}|g" \
              | sed "s|GOOGLE_PROCESSOR_ID_LAYOUT_VALUE|${{ vars.GOOGLE_PROCESSOR_ID_LAYOUT || '' }}|g")
            REVISION=$(aws ecs register-task-definition \
              --cli-input-json "$TASK_DEF" \
              --query 'taskDefinition.taskDefinitionArn' --output text)
            echo "Registered $REVISION"

            if aws ecs describe-services \
                --cluster "$CLUSTER" \
                --services "libraryai-${SVC}" \
                --query 'services[0].status' --output text 2>/dev/null \
                | grep -qE "ACTIVE|DRAINING"; then
              SC=$(sc_config "$SVC")
              DESIRED_ARGS=()
              case "$SVC" in
                eep-worker|eep-recovery|shadow-worker|retraining-worker|dataset-builder|iep0|iep1a|iep1b|iep1d|iep1e|iep2a|iep2b)
                  DESIRED_ARGS=(--desired-count 0)
                  ;;
              esac
              aws ecs update-service \
                --cluster "$CLUSTER" \
                --service "libraryai-${SVC}" \
                "${DESIRED_ARGS[@]}" \
                --task-definition "$REVISION" \
                --service-connect-configuration "$SC" \
                --force-new-deployment \
                --no-cli-pager
              echo "Updated production service libraryai-${SVC}"
            else
              echo "libraryai-${SVC} not yet created in production — skipping update"
            fi
          done

      - name: Ensure production processing services are stopped
        run: |
          set -e
          # Deploy only refreshes task definitions for off-by-default processing
          # services. Immediate processing scale-up is owned by normal_scaler.py,
          # which injects live RunPod URLs before starting eep-worker.
          for SVC in eep-worker eep-recovery shadow-worker retraining-worker dataset-builder iep0 iep1a iep1b iep1d iep1e iep2a iep2b; do
            if aws ecs describe-services \
                --cluster "$CLUSTER" \
                --services "libraryai-${SVC}" \
                --query 'services[0].status' --output text 2>/dev/null \
                | grep -qE "ACTIVE|DRAINING"; then
              aws ecs update-service \
                --cluster "$CLUSTER" \
                --service "libraryai-${SVC}" \
                --desired-count 0 \
                --no-cli-pager
              echo "libraryai-${SVC} desired -> 0"
            else
              echo "libraryai-${SVC} not present in production — skipping"
            fi
          done

      - name: Wait for production services to stabilise
        run: |
          CORE_SVCS=(eep frontend retraining-worker)
          ACTIVE=()
          for SVC in "${CORE_SVCS[@]}"; do
            DESIRED=$(aws ecs describe-services \
              --cluster "$CLUSTER" \
              --services "libraryai-${SVC}" \
              --query 'services[0].desiredCount' --output text 2>/dev/null || echo "0")
            if [ "$DESIRED" != "0" ] && [ "$DESIRED" != "None" ]; then
              ACTIVE+=("libraryai-${SVC}")
            fi
          done
          if [ ${#ACTIVE[@]} -gt 0 ]; then
            echo "Waiting for stable: ${ACTIVE[*]}"
            aws ecs wait services-stable \
              --cluster "$CLUSTER" \
              --services "${ACTIVE[@]}"
          else
            echo "No production services currently running — skipping stability wait"
          fi

  # ── 8. production smoke check ─────────────────────────────────────────────
  smoke-production:
    needs: deploy-production
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: ${{ vars.AWS_REGION }}

      - name: Production health check
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            "https://${{ vars.ALB_DNS_PROD }}/health")
          [ "$STATUS" = "200" ] || { echo "Production health check failed: HTTP $STATUS"; exit 1; }
          echo "Production health OK"

      - name: Production status check
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            "https://${{ vars.ALB_DNS_PROD }}/v1/status")
          [ "$STATUS" = "200" ] || { echo "Production status check failed: HTTP $STATUS"; exit 1; }
          echo "Production status OK"
