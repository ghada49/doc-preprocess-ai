name: Scale Up — Processing Window

on:
  # Schedule: 10 PM UTC daily. To change, edit this file and update the cron string.
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION:  ${{ vars.AWS_REGION }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}

jobs:
  scale-up:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: ${{ vars.AWS_REGION }}

      # ── Step 1: Create RunPod GPU pods (iep0, iep1a, iep1b) ─────────────
      - name: Create RunPod GPU pods
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          RUNPOD_POD_MODE: ${{ vars.RUNPOD_POD_MODE || 'create' }}
          RUNPOD_IEP0_POD_ID: ${{ vars.RUNPOD_IEP0_POD_ID || '' }}
          RUNPOD_IEP1A_POD_ID: ${{ vars.RUNPOD_IEP1A_POD_ID || '' }}
          RUNPOD_IEP1B_POD_ID: ${{ vars.RUNPOD_IEP1B_POD_ID || '' }}
          RUNPOD_GPU_TYPE_ID: ${{ vars.RUNPOD_GPU_TYPE_ID || 'NVIDIA RTX A5000' }}
          RUNPOD_GPU_TYPES: ${{ vars.RUNPOD_GPU_TYPES || 'NVIDIA RTX 4000 Ada Generation,NVIDIA RTX A4000,NVIDIA RTX 2000 Ada Generation,NVIDIA RTX A5000,NVIDIA RTX A4500,NVIDIA L4,NVIDIA A40,NVIDIA RTX A6000' }}
          RUNPOD_CLOUD_TYPE: ${{ vars.RUNPOD_CLOUD_TYPE || 'COMMUNITY' }}
          RUNPOD_CLOUD_TYPES: ${{ vars.RUNPOD_CLOUD_TYPES || 'COMMUNITY,SECURE' }}
          RUNPOD_CONTAINER_DISK_GB: ${{ vars.RUNPOD_CONTAINER_DISK_GB || '50' }}
          RUNPOD_MIN_VCPU_PER_GPU: ${{ vars.RUNPOD_MIN_VCPU_PER_GPU || '2' }}
          RUNPOD_MIN_RAM_PER_GPU: ${{ vars.RUNPOD_MIN_RAM_PER_GPU || '8' }}
        run: |
          set -euo pipefail

          normalize_cloud_type() {
            local VALUE
            VALUE="$(echo "${1:-COMMUNITY}" | tr '[:lower:]' '[:upper:]')"
            if [ "$VALUE" = "SECURITY" ]; then
              echo "SECURE"
            elif [ "$VALUE" = "SECURE" ] || [ "$VALUE" = "COMMUNITY" ]; then
              echo "$VALUE"
            else
              echo "COMMUNITY"
            fi
          }

          normalize_gpu_type() {
            case "$1" in
              A40) echo "NVIDIA A40" ;;
              "RTX 3090"|3090) echo "NVIDIA GeForce RTX 3090" ;;
              "RTX 4090"|4090) echo "NVIDIA GeForce RTX 4090" ;;
              "RTX A5000"|A5000) echo "NVIDIA RTX A5000" ;;
              *) echo "$1" ;;
            esac
          }

          GPU_CANDIDATES=()
          add_gpu_candidate() {
            local RAW="$1" GPU EXISTING
            RAW="$(echo "$RAW" | xargs)"
            [ -z "$RAW" ] && return 0
            GPU="$(normalize_gpu_type "$RAW")"
            for EXISTING in "${GPU_CANDIDATES[@]}"; do
              [ "$EXISTING" = "$GPU" ] && return 0
            done
            GPU_CANDIDATES+=("$GPU")
          }

          add_gpu_candidate "$RUNPOD_GPU_TYPE_ID"
          IFS=',' read -ra EXTRA_GPU_TYPES <<< "$RUNPOD_GPU_TYPES"
          for GPU_TYPE in "${EXTRA_GPU_TYPES[@]}"; do
            add_gpu_candidate "$GPU_TYPE"
          done
          if [ "${#GPU_CANDIDATES[@]}" -eq 0 ]; then
            add_gpu_candidate "NVIDIA RTX A5000"
          fi
          RUNPOD_CLOUD_TYPE="$(normalize_cloud_type "$RUNPOD_CLOUD_TYPE")"
          CLOUD_CANDIDATES=()
          add_cloud_candidate() {
            local CLOUD
            CLOUD="$(normalize_cloud_type "$1")"
            for EXISTING in "${CLOUD_CANDIDATES[@]}"; do
              [ "$EXISTING" = "$CLOUD" ] && return 0
            done
            CLOUD_CANDIDATES+=("$CLOUD")
          }
          add_cloud_candidate "$RUNPOD_CLOUD_TYPE"
          IFS=',' read -ra EXTRA_CLOUD_TYPES <<< "$RUNPOD_CLOUD_TYPES"
          for CLOUD_TYPE in "${EXTRA_CLOUD_TYPES[@]}"; do
            add_cloud_candidate "$CLOUD_TYPE"
          done
          echo "RunPod cloud candidates: ${CLOUD_CANDIDATES[*]}"
          echo "RunPod GPU candidates: ${GPU_CANDIDATES[*]}"

          if [ "$RUNPOD_POD_MODE" = "existing" ]; then
            IEP0_POD="$RUNPOD_IEP0_POD_ID"
            IEP1A_POD="$RUNPOD_IEP1A_POD_ID"
            IEP1B_POD="$RUNPOD_IEP1B_POD_ID"
            if [ -z "$IEP0_POD" ] || [ -z "$IEP1A_POD" ] || [ -z "$IEP1B_POD" ]; then
              echo "ERROR: RUNPOD_POD_MODE=existing requires RUNPOD_IEP0_POD_ID, RUNPOD_IEP1A_POD_ID, RUNPOD_IEP1B_POD_ID"
              exit 1
            fi

            resume_pod() {
              local POD_ID="$1" NAME="$2"
              curl -sf -X POST "https://api.runpod.io/graphql?api_key=${RUNPOD_API_KEY}" \
                -H "Content-Type: application/json" \
                -d "{\"query\":\"mutation { podResume(input: { podId: \\\"${POD_ID}\\\", gpuCount: 1 }) { id desiredStatus imageName } }\"}" \
                > /dev/null
              echo "Resumed $NAME pod: $POD_ID"
            }

            resume_pod "$IEP0_POD"  "iep0"
            resume_pod "$IEP1A_POD" "iep1a"
            resume_pod "$IEP1B_POD" "iep1b"

            echo "IEP0_POD_ID=$IEP0_POD"   >> "$GITHUB_ENV"
            echo "IEP1A_POD_ID=$IEP1A_POD" >> "$GITHUB_ENV"
            echo "IEP1B_POD_ID=$IEP1B_POD" >> "$GITHUB_ENV"
            echo "IEP0_URL=https://${IEP0_POD}-8006.proxy.runpod.net"   >> "$GITHUB_ENV"
            echo "IEP1A_URL=https://${IEP1A_POD}-8001.proxy.runpod.net" >> "$GITHUB_ENV"
            echo "IEP1B_URL=https://${IEP1B_POD}-8002.proxy.runpod.net" >> "$GITHUB_ENV"
            echo "{\"iep0\":\"$IEP0_POD\",\"iep1a\":\"$IEP1A_POD\",\"iep1b\":\"$IEP1B_POD\"}" \
              | aws s3 cp - s3://libraryai2/ops/runpod-pods.json
            exit 0
          fi

          create_pod() {
            local NAME="$1" IMAGE="$2" PORT="$3"
            local GPU_JSON RESPONSE POD_ID PAYLOAD CLOUD_TYPE
            GPU_JSON=$(printf '%s\n' "${GPU_CANDIDATES[@]}" | python3 -c 'import json,sys; print(json.dumps([line.strip() for line in sys.stdin if line.strip()]))')
            for CLOUD_TYPE in "${CLOUD_CANDIDATES[@]}"; do
              echo "Creating $NAME on RunPod REST cloudType=$CLOUD_TYPE gpuTypeIds=$GPU_JSON" >&2
              PAYLOAD=$(python3 -c 'import json,os,sys; name,image,port,cloud,gpu_json=sys.argv[1:6]; env={"PYTHONPATH":"/app","AWS_REGION":os.environ.get("AWS_REGION","eu-central-1"),"S3_REGION":os.environ.get("AWS_REGION","eu-central-1"),"S3_BUCKET_NAME":"libraryai2","HEALTH_PORT":port,"RUNPOD_TERMINATE_ON_IDLE":"true"}; env.update({"IEP0_MODEL_PATH":"/app/models/iep0/classifier.pt"} if name.endswith("iep0") else {"IEP1A_MODELS_DIR":"/app/models/iep1a"} if name.endswith("iep1a") else {"IEP1B_MODELS_DIR":"/app/models/iep1b"} if name.endswith("iep1b") else {}); payload={"name":name,"imageName":image,"computeType":"GPU","cloudType":cloud,"gpuCount":1,"gpuTypeIds":json.loads(gpu_json),"gpuTypePriority":"availability","interruptible":False,"containerDiskInGb":int(os.environ.get("RUNPOD_CONTAINER_DISK_GB","50") or "50"),"minVCPUPerGPU":int(os.environ.get("RUNPOD_MIN_VCPU_PER_GPU","2") or "2"),"minRAMPerGPU":int(os.environ.get("RUNPOD_MIN_RAM_PER_GPU","8") or "8"),"ports":[f"{port}/http"],"env":env}; print(json.dumps(payload))' "$NAME" "$IMAGE" "$PORT" "$CLOUD_TYPE" "$GPU_JSON")
              RESPONSE=$(curl -sS -X POST "https://rest.runpod.io/v1/pods" \
                -H "Authorization: Bearer ${RUNPOD_API_KEY}" \
                -H "Content-Type: application/json" \
                -d "$PAYLOAD")
              POD_ID=$(echo "$RESPONSE" | python3 -c 'import json,sys; d=json.load(sys.stdin); pod_id=d.get("id") or d.get("data", {}).get("id"); print(pod_id or ""); sys.exit(0 if pod_id else 1)' 2>/dev/null || true)
              if [ -n "$POD_ID" ]; then
                echo "$POD_ID"
                return 0
              fi
              echo "RunPod REST create failed for $NAME cloudType=$CLOUD_TYPE" >&2
              echo "$RESPONSE" >&2
            done
            echo "ERROR: failed to create $NAME with all GPU candidates: ${GPU_CANDIDATES[*]}" >&2
            return 1
          }

          IEP0_POD=$(create_pod  "libraryai-iep0"  "gma51/libraryai-iep0:latest"  "8006")
          IEP1A_POD=$(create_pod "libraryai-iep1a" "gma51/libraryai-iep1a:latest" "8001")
          IEP1B_POD=$(create_pod "libraryai-iep1b" "gma51/libraryai-iep1b:latest" "8002")

          echo "IEP0_POD_ID=$IEP0_POD"   >> "$GITHUB_ENV"
          echo "IEP1A_POD_ID=$IEP1A_POD" >> "$GITHUB_ENV"
          echo "IEP1B_POD_ID=$IEP1B_POD" >> "$GITHUB_ENV"

          echo "IEP0_URL=https://${IEP0_POD}-8006.proxy.runpod.net"   >> "$GITHUB_ENV"
          echo "IEP1A_URL=https://${IEP1A_POD}-8001.proxy.runpod.net" >> "$GITHUB_ENV"
          echo "IEP1B_URL=https://${IEP1B_POD}-8002.proxy.runpod.net" >> "$GITHUB_ENV"

          echo "Created RunPod pods:"
          echo "  iep0:  $IEP0_POD  → https://${IEP0_POD}-8006.proxy.runpod.net"
          echo "  iep1a: $IEP1A_POD → https://${IEP1A_POD}-8001.proxy.runpod.net"
          echo "  iep1b: $IEP1B_POD → https://${IEP1B_POD}-8002.proxy.runpod.net"

          # Persist pod IDs so scale-down can terminate them
          echo "{\"iep0\":\"$IEP0_POD\",\"iep1a\":\"$IEP1A_POD\",\"iep1b\":\"$IEP1B_POD\"}" \
            | aws s3 cp - s3://libraryai2/ops/runpod-pods.json
          echo "Pod IDs saved to s3://libraryai2/ops/runpod-pods.json"

      # ── Step 2: Wait for RunPod pods to respond to health checks ─────────
      - name: Wait for RunPod pods to be ready
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: |
          set -euo pipefail

          wait_for_pod() {
            local POD_ID="$1" PORT="$2" NAME="$3"
            local URL="https://${POD_ID}-${PORT}.proxy.runpod.net/health"
            echo "Waiting for $NAME to become ready at $URL ..."
            for i in $(seq 1 40); do
              # Check RunPod pod status via API
              STATUS=$(curl -sf -X POST "https://api.runpod.io/graphql?api_key=${RUNPOD_API_KEY}" \
                -H "Content-Type: application/json" \
                -d "{\"query\":\"query { pod(input: {podId: \\\"${POD_ID}\\\"}) { desiredStatus runtime { uptimeInSeconds } } }\"}" \
                | python3 -c "import sys,json; d=json.load(sys.stdin); p=d['data']['pod']; print('RUNNING' if p.get('runtime') is not None else p.get('desiredStatus','UNKNOWN'))" 2>/dev/null || echo "UNKNOWN")
              echo "  attempt $i/40 — $NAME pod status=$STATUS"
              if [ "$STATUS" = "RUNNING" ]; then
                # Pod is up — check service health endpoint
                if curl -sf --max-time 10 "$URL" > /dev/null 2>&1; then
                  echo "$NAME is healthy."
                  return 0
                fi
              fi
              sleep 15
            done
            echo "ERROR: $NAME pod did not become healthy within 10 minutes"
            exit 1
          }

          wait_for_pod "$IEP0_POD_ID"  "8006" "iep0"
          wait_for_pod "$IEP1A_POD_ID" "8001" "iep1a"
          wait_for_pod "$IEP1B_POD_ID" "8002" "iep1b"
          echo "All RunPod GPU pods are healthy."

      # ── Step 3: Register eep-worker task def with RunPod IEP URLs ────────
      - name: Update eep-worker task definition with RunPod IEP URLs
        run: |
          CLUSTER="$ECS_CLUSTER"
          TASK_DEF=$(cat k8s/ecs/eep-worker-task-def.json \
            | sed "s/ACCOUNT_ID/${{ vars.AWS_ACCOUNT_ID }}/g" \
            | sed "s/REGION/${{ vars.AWS_REGION }}/g" \
            | sed "s/CLUSTER_NAME/${CLUSTER}/g" \
            | sed "s|IEP0_URL_VALUE|${IEP0_URL}|g" \
            | sed "s|IEP1A_URL_VALUE|${IEP1A_URL}|g" \
            | sed "s|IEP1B_URL_VALUE|${IEP1B_URL}|g" \
            | sed "s|IEP1E_URL_VALUE|http://iep1e:8007|g" \
            | sed "s|IEP2A_URL_VALUE|http://iep2a:8004|g" \
            | sed "s|IEP2B_URL_VALUE|http://iep2b:8005|g")
          REVISION=$(aws ecs register-task-definition \
            --cli-input-json "$TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "EEP_WORKER_TASK_DEF=$REVISION" >> "$GITHUB_ENV"
          echo "Registered eep-worker task def: $REVISION"

      # ── Step 4: Start CPU inference services ─────────────────────────────
      - name: Start CPU IEP services (iep1e, iep2a, iep2b)
        run: |
          for SVC in iep1e iep2a iep2b; do
            aws ecs update-service \
              --cluster "$ECS_CLUSTER" \
              --service "libraryai-${SVC}" \
              --desired-count 1 \
              --no-cli-pager
            echo "Started libraryai-${SVC}"
          done

      - name: Wait for CPU IEP services to become healthy
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services libraryai-iep1e libraryai-iep2a libraryai-iep2b
          echo "All CPU IEP services healthy."

      # ── Step 5: Start processing workers ─────────────────────────────────
      # NOTE: libraryai-eep is always-on and is NOT managed by this workflow.
      - name: Start workers
        run: |
          DESIRED=${{ vars.WORKER_DESIRED_COUNT || '2' }}
          # eep-worker gets the new task def with RunPod IEP URLs
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service libraryai-eep-worker \
            --task-definition "$EEP_WORKER_TASK_DEF" \
            --desired-count "$DESIRED" \
            --force-new-deployment \
            --no-cli-pager
          echo "Started libraryai-eep-worker desired=$DESIRED (RunPod URLs injected)"

          for SVC in eep-recovery shadow-worker; do
            aws ecs update-service \
              --cluster "$ECS_CLUSTER" \
              --service "libraryai-${SVC}" \
              --desired-count "$DESIRED" \
              --no-cli-pager
            echo "Started libraryai-${SVC} desired=$DESIRED"
          done

      # NOTE: libraryai-iep1d is a rescue-path service — NOT started here.
      - name: Wait for workers to become healthy
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services libraryai-eep-worker libraryai-eep-recovery libraryai-shadow-worker
          echo "All workers healthy — processing window open."
          echo ""
          echo "RunPod GPU pods:"
          echo "  iep0:  ${IEP0_URL}"
          echo "  iep1a: ${IEP1A_URL}"
          echo "  iep1b: ${IEP1B_URL}"
